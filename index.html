<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Cuina Intel·ligent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9; 
            min-height: 100vh;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .day-card { 
            min-height: 380px; 
            display: flex; 
            flex-direction: column; 
            background-color: #1e293b; 
            border: 1px solid #334155;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .day-card.today {
            background-color: #0f172a;
            border: 3px solid #f59e0b;
            transform: scale(1.02);
            z-index: 10;
        }

        .recipe-chip {
            background: rgba(51, 65, 85, 0.5);
            border-left: 3px solid #f59e0b;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app-root" class="max-w-7xl mx-auto relative">
        <!-- Capçalera -->
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tight flex items-center gap-3">
                    Cuina de Casa <span class="text-orange-500">🥘</span>
                </h1>
                <div class="flex items-center gap-2 mt-2">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-orange-500 animate-pulse"></div>
                    <p id="status-text" class="text-slate-500 text-xs font-bold uppercase tracking-wider">Connectant amb Firebase...</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 bg-white p-2.5 rounded-[2rem] shadow-md border border-slate-200">
                <button id="btn-prev" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-slate-100 transition-all text-slate-600 text-xl font-bold border border-slate-100">〈</button>
                <span id="rango-fechas" class="px-6 font-black text-slate-800 text-lg min-w-[160px] text-center tracking-tight">Carregant...</span>
                <button id="btn-next" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-slate-100 transition-all text-slate-600 text-xl font-bold border border-slate-100">〉</button>
            </div>
        </header>

        <!-- Calendari de 7 dies -->
        <div id="calendar-grid" class="grid grid-cols-1 md:grid-cols-7 gap-5 mb-12">
            <!-- Es genera per JS -->
        </div>

        <!-- Secció de Receptes -->
        <div class="bg-white rounded-[3rem] p-8 shadow-xl border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <h2 class="text-3xl font-black text-slate-800 flex items-center gap-3">
                    📖 Receptari
                    <span id="count-aliments" class="text-sm bg-orange-100 text-orange-600 px-4 py-1.5 rounded-full font-black">0</span>
                </h2>
                <div class="relative w-full md:w-64">
                    <input type="text" id="search-main" placeholder="Cerca recepta..." class="w-full pl-10 pr-4 py-3 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none text-sm font-bold text-slate-700">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                </div>
            </div>
            <div id="grid-aliments" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 max-h-[500px] overflow-y-auto custom-scroll pr-4">
                <!-- Es genera per JS -->
            </div>
        </div>
    </div>

    <!-- Modal de Selecció -->
    <div id="modal-receptes" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[3rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <div>
                    <h3 class="font-black text-slate-800 text-2xl">Afegir a <span id="modal-dia-label" class="text-orange-500">...</span></h3>
                    <p class="text-slate-400 text-sm font-medium mt-1">Tria un plat de la teva llista</p>
                </div>
                <button id="btn-close-modal" class="bg-slate-200 hover:bg-slate-300 w-12 h-12 rounded-full flex items-center justify-center text-slate-600 text-2xl transition-transform hover:rotate-90">×</button>
            </div>
            <div class="p-8">
                <div id="llista-modal" class="max-h-[400px] overflow-y-auto custom-scroll space-y-3 pr-2">
                    <!-- JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        (function() {
            let db;
            let offset = 0, selFecha = "", selTipo = "", allAliments = [], allSelections = {}, allCaducitats = {};

            const toISO = (d) => d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
            const toDM = (d) => d.getDate() + "/" + (d.getMonth()+1);

            function initFirebase() {
                try {
                    const config = { databaseURL: "https://calendari-menjars-default-rtdb.europe-west1.firebasedatabase.app" };
                    if (!firebase.apps.length) { 
                        firebase.initializeApp(config); 
                    }
                    db = firebase.database();
                    setupListeners();
                } catch (e) {
                    console.error("Firebase Initialization Error:", e);
                    document.getElementById('status-text').innerText = "Error de connexió";
                }
            }

            function setupListeners() {
                db.ref('aliments').on('value', s => {
                    const v = s.val(); 
                    allAliments = [];
                    if(v) {
                        Object.values(v).forEach(i => {
                            if (i) allAliments.push(typeof i === 'string' ? {nom: i} : i);
                        });
                    }
                    allAliments.sort((a,b) => (a.nom || "").localeCompare(b.nom || ""));
                    render();
                }, err => console.error("Firebase 'aliments' Error:", err));

                db.ref('seleccions').on('value', s => { 
                    allSelections = s.val() || {}; 
                    render(); 
                }, err => console.error("Firebase 'seleccions' Error:", err));

                db.ref('aliments_caducitat').on('value', s => { 
                    allCaducitats = s.val() || {}; 
                    const dot = document.getElementById('status-dot');
                    if (dot) {
                        dot.classList.replace('bg-orange-500', 'bg-emerald-500');
                        dot.classList.remove('animate-pulse');
                        document.getElementById('status-text').innerText = "Sincronitzat amb èxit";
                    }
                    render(); 
                }, err => console.error("Firebase 'caducitat' Error:", err));
            }

            window.openWpModal = (f, t) => {
                selFecha = f; selTipo = t;
                document.getElementById('modal-dia-label').innerText = t === 'comida' ? 'Dinar' : 'Sopar';
                document.getElementById('modal-receptes').classList.remove('hidden');
                
                const box = document.getElementById('llista-modal');
                box.innerHTML = "";
                allAliments.forEach(a => {
                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center p-5 bg-slate-50 hover:bg-orange-50 rounded-2xl cursor-pointer transition-all border border-slate-100 hover:border-orange-200 group";
                    item.onclick = () => window.addPlat(a.nom);
                    item.innerHTML = `<span class="text-slate-800 font-bold text-lg">${a.nom}</span><span class="text-orange-500 font-black text-xl group-hover:scale-125 transition-transform">＋</span>`;
                    box.appendChild(item);
                });
            };

            window.addPlat = (nom) => {
                if (!db) return;
                let plats = Array.isArray(allSelections[selFecha]?.[selTipo]) ? [...allSelections[selFecha][selTipo]] : [];
                plats.push(nom);
                db.ref('seleccions/' + selFecha + '/' + selTipo).set(plats).then(() => {
                    document.getElementById('modal-receptes').classList.add('hidden');
                });
            };

            window.delPlat = (f, t, i) => {
                if (!db) return;
                let plats = [...(allSelections[f]?.[t] || [])];
                plats.splice(i, 1);
                db.ref('seleccions/' + f + '/' + t).set(plats);
            };

            window.delCaducitat = (key) => {
                if (!db) return;
                if(confirm("Vols eliminar aquest avís de caducitat?")) {
                    db.ref('aliments_caducitat/' + key).remove();
                }
            };

            function render() {
                const calendarGrid = document.getElementById('calendar-grid');
                if (!calendarGrid) return;

                const hoy = new Date(); hoy.setHours(0,0,0,0);
                const d = new Date();
                const day = d.getDay(), diff = d.getDate() - (day == 0 ? 6 : day - 1);
                const lunes = new Date(d.setDate(diff + (offset * 7))); lunes.setHours(0,0,0,0);
                const dom = new Date(lunes); dom.setDate(lunes.getDate() + 6);
                
                document.getElementById('rango-fechas').innerText = toDM(lunes) + " - " + toDM(dom);
                const diesNames = ["Dilluns", "Dimarts", "Dimecres", "Dijous", "Divendres", "Dissabte", "Diumenge"];
                calendarGrid.innerHTML = "";

                for (let i = 0; i < 7; i++) {
                    const curr = new Date(lunes); curr.setDate(lunes.getDate() + i);
                    const iso = toISO(curr);
                    const esHoy = curr.toDateString() === hoy.toDateString();

                    let cadHtml = "";
                    Object.keys(allCaducitats).forEach(key => {
                        if (allCaducitats[key].caducitat === iso) {
                            cadHtml += `<div class="mt-3 p-3 bg-red-500 text-white rounded-2xl text-[11px] font-black relative group shadow-lg border-2 border-red-400 animate-bounce">
                                ⚠️ ${allCaducitats[key].nom}
                                <button onclick="window.delCaducitat('${key}')" class="absolute -top-2 -right-2 bg-white text-red-600 rounded-full w-5 h-5 flex items-center justify-center opacity-0 group-hover:opacity-100 shadow-md">×</button>
                            </div>`;
                        }
                    });

                    const card = document.createElement('div');
                    card.className = `day-card p-6 rounded-[2.5rem] ${esHoy ? 'today' : ''}`;
                    
                    let inner = `<div class="text-center mb-8">
                        <p class="text-[11px] font-black uppercase tracking-[0.2em] ${esHoy ? 'text-orange-400' : 'text-slate-500'} mb-1">${diesNames[i]}</p>
                        <p class="text-5xl font-black text-white tracking-tighter">${curr.getDate()}</p>
                        ${cadHtml}
                    </div>`;

                    ["comida", "cena"].forEach(t => {
                        const icon = t === 'comida' ? '☀️' : '🌙';
                        const tNom = t === 'comida' ? 'DINAR' : 'SOPAR';
                        const plats = allSelections[iso]?.[t] || [];
                        let pList = plats.map((n, idx) => `
                            <div class="recipe-chip flex justify-between items-center p-3 rounded-2xl mb-1.5 text-[12px] text-slate-100 backdrop-blur-sm">
                                <span class="font-bold truncate mr-2">${n}</span>
                                <button onclick="window.delPlat('${iso}','${t}',${idx})" class="text-slate-500 hover:text-white font-black text-lg leading-none">×</button>
                            </div>
                        `).join('');

                        inner += `<div class="mb-6 last:mb-0">
                            <p class="text-[10px] font-black text-slate-500 tracking-widest mb-3 flex items-center gap-2">${icon} ${tNom}</p>
                            <div class="space-y-1">${pList}</div>
                            <button onclick="window.openWpModal('${iso}','${t}')" class="w-full py-3 text-[11px] font-black text-slate-400 border-2 border-dashed border-slate-700 rounded-2xl hover:bg-slate-800 hover:text-white hover:border-slate-600 transition-all mt-3">＋ AFEGIR</button>
                        </div>`;
                    });

                    card.innerHTML = inner;
                    calendarGrid.appendChild(card);
                }
                renderAliments();
            }

            function renderAliments() {
                const box = document.getElementById('grid-aliments');
                const searchInput = document.getElementById('search-main');
                if (!box || !searchInput) return;

                const filter = searchInput.value.toLowerCase();
                box.innerHTML = "";
                
                const filtered = allAliments.filter(a => (a.nom || "").toLowerCase().includes(filter));
                const countElem = document.getElementById('count-aliments');
                if (countElem) countElem.innerText = filtered.length;

                filtered.forEach(a => {
                    box.innerHTML += `<div class="bg-slate-50 p-5 rounded-[2rem] border-2 border-slate-100 flex flex-col items-center text-center gap-3 hover:border-orange-300 hover:bg-white transition-all shadow-sm group">
                        <div class="w-14 h-14 rounded-2xl bg-white text-orange-500 flex items-center justify-center font-black text-2xl shadow-sm border border-slate-100 group-hover:scale-110 transition-transform">${a.nom ? a.nom.charAt(0).toUpperCase() : '?'}</div>
                        <span class="text-sm font-black text-slate-800 leading-tight">${a.nom}</span>
                    </div>`;
                });
            }

            const checkFirebaseInterval = setInterval(() => {
                if (typeof firebase !== 'undefined') {
                    clearInterval(checkFirebaseInterval);
                    initFirebase();
                }
            }, 100);

            document.getElementById('btn-prev').onclick = () => { offset--; render(); };
            document.getElementById('btn-next').onclick = () => { offset++; render(); };
            document.getElementById('btn-close-modal').onclick = () => {
                document.getElementById('modal-receptes').classList.add('hidden');
            };
            document.getElementById('search-main').onkeyup = renderAliments;

        })();
    </script>
</body>
</html>
