
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuina de Casa Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #f59e0b;
            --dark-card: #1e293b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            padding-bottom: 120px;
        }

        .day-card-dark {
            background-color: var(--dark-card);
            color: white;
            border-radius: 2rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .btn-add-dashed {
            width: 100%;
            border: 1px dashed rgba(255,255,255,0.3);
            border-radius: 1rem;
            padding: 10px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .item-row {
            background: rgba(255,255,255,0.08);
            border-radius: 0.75rem;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 6px;
            border-left: 3px solid var(--primary);
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            gap: 4px;
        }

        .active-tab {
            background-color: var(--primary) !important;
            color: white !important;
            transform: translateY(-4px);
        }

        .caducitat-alert {
            background-color: #fee2e2;
            color: #b91c1c;
            border-radius: 0.75rem;
            padding: 8px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
            width: 100%;
        }
        
        .today-card {
            border: 3px solid var(--primary);
        }

        .recipe-card-text {
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            display: block;
            width: 100%;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #334155;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .food-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: transform 0.2s;
        }

        .food-card:active {
            transform: scale(0.98);
        }

        .action-btn-circle {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 18px;
            background: #f1f5f9;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn-circle.active-heart { background: #fee2e2; }
        .action-btn-circle.active-eyes { background: #e0f2fe; }

        .link-footer-btn {
            width: 100%;
            padding: 8px;
            background: #f8fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            border: 1px solid #f1f5f9;
        }

        .seasonal-suggestion {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border: 2px solid #fbbf24;
            border-radius: 2rem;
            padding: 1.25rem;
            margin-bottom: 2rem;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900">

    <div id="toast" class="toast">Acció realitzada correctament</div>

    <div id="app-root" class="max-w-md mx-auto px-4 py-6">
        
        <header class="flex flex-col gap-4 mb-8 text-center">
            <h1 class="text-2xl font-extrabold tracking-tight">El meu <span class="text-orange-500">Menú</span></h1>
            <div class="flex items-center justify-center gap-4 bg-white p-2 rounded-2xl shadow-sm border">
                <button onclick="changeWeek(-1)" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 font-bold">‹</button>
                <span id="rango-fechas" class="text-sm font-black text-slate-700 min-w-[140px]">...</span>
                <button onclick="changeWeek(1)" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 font-bold">〉</button>
            </div>
        </header>

        <div id="daily-suggestion-container"></div>
        <div id="calendar-grid" class="flex flex-col gap-6 mb-12"></div>

        <div id="dynamic-content" class="mb-12 hidden">
            <div id="list-tab-content" class="hidden">
                <input type="text" id="search-input" oninput="renderFoodGrid()" placeholder="Cerca receptes..." class="w-full p-4 bg-white rounded-2xl border shadow-sm mb-4 font-bold outline-none focus:ring-2 focus:ring-orange-500">
                <div id="main-grid" class="grid grid-cols-1 gap-4"></div>
            </div>

            <div id="caducitat-tab-content" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-orange-100">
                    <h3 class="font-black text-xs text-slate-400 uppercase mb-4">Nova Caducitat</h3>
                    <input type="text" id="cad-nom" placeholder="Què caduca?" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border mb-2 outline-none">
                    <div class="flex gap-2">
                        <input type="date" id="cad-data" class="flex-1 p-4 bg-slate-50 rounded-2xl font-bold border outline-none">
                        <button onclick="saveCaducitat()" class="bg-orange-500 text-white px-6 rounded-2xl font-black text-xs">DESAR</button>
                    </div>
                </div>
                <div id="cad-list-grid" class="space-y-3"></div>
            </div>

            <div id="export-tab-content" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4">
                    <h3 class="font-bold text-xs uppercase text-slate-400">Exportar Menú Setmanal</h3>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold block ml-1">DES DE:</label>
                        <input type="date" id="export-start" class="w-full p-3 bg-slate-50 rounded-xl border font-bold text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold block ml-1">FINS A:</label>
                        <input type="date" id="export-end" class="w-full p-3 bg-slate-50 rounded-xl border font-bold text-sm">
                    </div>
                    <button onclick="exportMenuCSV()" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-black text-xs shadow-lg shadow-orange-100">DESCARREGAR (CSV)</button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t p-4 flex justify-around items-center z-50">
            <button onclick="setTab('all')" id="btn-all" class="p-3 text-xl rounded-2xl transition-all">📂</button>
            <button onclick="setTab('favs')" id="btn-favs" class="p-3 text-xl rounded-2xl transition-all">❤️</button>
            <button onclick="openCreateAliment('', '', '', '')" class="bg-orange-500 text-white w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center text-xl hover:scale-110 transition-transform">＋</button>
            <button onclick="setTab('caducitat')" id="btn-caducitat" class="p-3 text-xl rounded-2xl transition-all">⌛</button>
            <button onclick="setTab('export')" id="btn-export" class="p-3 text-xl rounded-2xl transition-all">📊</button>
        </div>
    </div>

    <div id="modal-container" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onclick="closeModalExtern(event)">
        <div id="modal-content" class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar" onclick="event.stopPropagation()"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        let db;
        let offset = 0;
        let activeTab = 'none';
        let allAliments = [];
        let allSelections = {};
        let allCaducitats = {};

        const suggeriments = [
            { nom: "Faves a la Catalana", temps: "45 min", link: "https://www.bonviveur.es/recetas/habas-a-la-catalana", ingredients: "500g faves, cansalada, botifarra negra, ceba, menta.", metode: "Daurar la cansalada. Afegir faves i menta. Coure tapat a foc lent." },
            { nom: "Arròs amb Verdures", temps: "30 min", link: "https://www.directoalpaladar.com/recetas-de-arroces/arroz-verduras-receta-saludable-facil-deliciosa", ingredients: "Arròs rodó, pebrot, ceba, pèsols, brou de verdura.", metode: "Fer sofregit, afegir arròs i brou calent. 18 minuts." },
            { nom: "Bacallà amb Samfaina", temps: "35 min", link: "https://www.bonviveur.es/recetas/bacalao-con-samfaina", ingredients: "Bacallà dessalat, albergínia, carbassó, tomàquet.", metode: "Fregir el bacallà. Fer samfaina i coure tot junt 5 minuts." },
            { nom: "Pollastre al Forn", temps: "60 min", link: "https://www.directoalpaladar.com/recetas-de-carnes-y-aves/pollo-al-horno-receta-facil", ingredients: "Pollastre, patates, ceba, vi blanc, romaní.", metode: "Tot a la safata del forn 200ºC durant 45-50 minuts." },
            { nom: "Espinacs amb Pinyons", temps: "15 min", link: "https://www.bonviveur.es/recetas/espinacas-a-la-catalana", ingredients: "Espinacs frescos, pinyons, panses, all.", metode: "Saltejar l'all i els fruits secs. Afegir espinacs fins que baixin." },
            { nom: "Crema de Carbassó", temps: "25 min", link: "https://www.directoalpaladar.com/recetas-de-legumbres-y-verduras/crema-de-calabacin-receta-facil", ingredients: "Carbassó, ceba, patata, formatgets o crema de llet.", metode: "Bullir la verdura i triturar amb el formatge." }
        ];

        window.onload = initFirebase;

        function initFirebase() {
            const config = { databaseURL: "https://calendari-menjars-default-rtdb.europe-west1.firebasedatabase.app" };
            if (!firebase.apps.length) firebase.initializeApp(config);
            db = firebase.database();
            
            db.ref('aliments').on('value', s => {
                const val = s.val() || {};
                allAliments = Object.keys(val).map(key => ({ ...val[key], id: key }));
                render();
            });
            db.ref('seleccions').on('value', s => { allSelections = s.val() || {}; render(); });
            db.ref('aliments_caducitat').on('value', s => { allCaducitats = s.val() || {}; render(); });
        }

        function setTab(tab) {
            activeTab = (activeTab === tab) ? 'none' : tab;
            render();
        }

        function changeWeek(dir) {
            offset += dir;
            render();
        }

        function render() {
            renderHeader();
            renderCalendar();
            renderDynamic();
            renderDailySuggestion();
            updateUI();
        }

        function renderHeader() {
            const d = new Date();
            const start = new Date(d.setDate(d.getDate() - (d.getDay() || 7) + 1 + (offset * 7)));
            const end = new Date(start); end.setDate(start.getDate() + 6);
            const r = document.getElementById('rango-fechas');
            if(r) r.innerText = `${start.getDate()}/${start.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            if(!grid) return;
            if(activeTab !== 'none') {
                grid.innerHTML = "";
                return;
            }
            grid.innerHTML = "";
            const today = new Date().toISOString().split('T')[0];
            const d = new Date();
            const start = new Date(d.setDate(d.getDate() - (d.getDay() || 7) + 1 + (offset * 7)));
            const dies = ["DILLUNS", "DIMARTS", "DIMECRES", "DIJOUS", "DIVENDRES", "DISSABTE", "DIUMENGE"];
            
            for(let i=0; i<7; i++) {
                const cur = new Date(start); cur.setDate(start.getDate() + i);
                const iso = cur.toISOString().split('T')[0];
                const alerts = Object.values(allCaducitats).filter(c => c && c.caducitat === iso);
                const card = document.createElement('div');
                card.className = `day-card-dark ${iso === today ? 'today-card' : ''}`;
                card.innerHTML = `
                    <div class="mb-4">
                        <span class="text-[10px] font-bold text-orange-400">${dies[i]}</span>
                        <h2 class="text-4xl font-black">${cur.getDate()}</h2>
                        ${alerts.map(a => `<div class="caducitat-alert">⚠️ ${a.nom}</div>`).join('')}
                    </div>
                    <div class="w-full text-left space-y-6">
                        <div>
                            <div class="section-label">☀️ DINAR</div>
                            <div id="list-${iso}-comida">${renderPlats(iso, 'comida')}</div>
                            <button onclick="openSelector('${iso}', 'comida')" class="btn-add-dashed">+ AFEGIR PLAT</button>
                        </div>
                        <div>
                            <div class="section-label">🌙 SOPAR</div>
                            <div id="list-${iso}-cena">${renderPlats(iso, 'cena')}</div>
                            <button onclick="openSelector('${iso}', 'cena')" class="btn-add-dashed">+ AFEGIR PLAT</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function renderPlats(fecha, tipo) {
            const p = (allSelections[fecha] && allSelections[fecha][tipo]) ? allSelections[fecha][tipo] : [];
            return p.map((n, i) => `
                <div class="item-row">
                    <span class="text-sm font-bold recipe-card-text">${n}</span>
                    <button onclick="removePlat('${fecha}','${tipo}',${i})" class="text-white/20 hover:text-red-400 ml-2 shrink-0">×</button>
                </div>
            `).join('');
        }

        function renderDynamic() {
            const cont = document.getElementById('dynamic-content');
            const list = document.getElementById('list-tab-content');
            const cad = document.getElementById('caducitat-tab-content');
            const exp = document.getElementById('export-tab-content');
            
            if(cont) cont.classList.toggle('hidden', activeTab === 'none');
            if(list) list.classList.toggle('hidden', !['all', 'favs'].includes(activeTab));
            if(cad) cad.classList.toggle('hidden', activeTab !== 'caducitat');
            if(exp) exp.classList.toggle('hidden', activeTab !== 'export');
            
            if(activeTab === 'caducitat') renderCadList();
            if(['all', 'favs'].includes(activeTab)) renderFoodGrid();
        }

        function renderFoodGrid() {
            const grid = document.getElementById('main-grid');
            const searchInput = document.getElementById('search-input');
            if(!grid) return;
            const search = searchInput ? searchInput.value.toLowerCase() : "";
            grid.innerHTML = "";
            let filtered = allAliments.filter(a => (a && a.nom ? a.nom.toLowerCase() : "").includes(search));
            if(activeTab === 'favs') filtered = filtered.filter(a => a && a.fav);
            
            filtered.sort((a,b) => (a.nom || "").localeCompare(b.nom || "")).forEach(a => {
                const div = document.createElement('div');
                div.className = "food-card cursor-pointer";
                const isFav = !!a.fav;
                const isProvar = !!a.provar;
                const safeNom = (a.nom || '').replace(/'/g, "\\'");
                const safeLink = (a.link || '').replace(/'/g, "\\'");
                
                div.innerHTML = `
                    <div class="flex items-center justify-between gap-4">
                        <div class="action-btn-circle ${isFav ? 'active-heart' : ''}" onclick="toggleFav('${a.id}', ${!isFav}, event)">
                            ${isFav ? '❤️' : '🤍'}
                        </div>
                        <div class="text-center flex-1" onclick="openEditById('${a.id}')">
                            <div class="text-sm font-black leading-tight recipe-card-text">${a.nom || 'Sense nom'}</div>
                        </div>
                        <div class="action-btn-circle ${isProvar ? 'active-eyes' : ''}" onclick="toggleProvar('${a.id}', ${!isProvar}, event)">
                            ${isProvar ? '👀' : '👁️'}
                        </div>
                    </div>
                    <div class="link-footer-btn" onclick="handleActionClick(event, '${safeLink}', '${safeNom}')">
                        <span>${a.link ? '🔗 VEURE WEB' : '🔍 BUSCAR'}</span>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function renderCadList() {
            const grid = document.getElementById('cad-list-grid');
            if(!grid) return;
            grid.innerHTML = "";
            const entries = Object.entries(allCaducitats).sort((a,b) => new Date(a[1].caducitat) - new Date(b[1].caducitat));
            entries.forEach(([id, c]) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center";
                div.innerHTML = `
                    <div class="flex-1 pr-4">
                        <div class="font-black text-sm recipe-card-text">${c.nom}</div>
                        <div class="text-[10px] font-bold text-red-500 uppercase">${c.caducitat}</div>
                    </div>
                    <button onclick="deleteCaducitat('${id}')" class="text-red-400 font-black text-xs px-3">ESBORRAR</button>
                `;
                grid.appendChild(div);
            });
        }

        function renderDailySuggestion() {
            const container = document.getElementById('daily-suggestion-container');
            if (!container) return;
            if (activeTab !== 'none') {
                container.innerHTML = "";
                return;
            }
            const day = new Date().getDate();
            const recipe = suggeriments[day % suggeriments.length];
            const safeNom = recipe.nom.replace(/'/g, "\\'");
            const safeIng = recipe.ingredients.replace(/'/g, "\\'").replace(/\n/g, " ");
            const safeMet = recipe.metode.replace(/'/g, "\\'").replace(/\n/g, " ");
            const safeLnk = recipe.link.replace(/'/g, "\\'");

            container.innerHTML = `
                <div class="seasonal-suggestion">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black text-orange-600 bg-orange-200 px-2 py-1 rounded-lg">SUGGERIMENT DEL DIA 🌿</span>
                        <span class="text-[10px] font-bold text-slate-500">⏱️ ${recipe.temps}</span>
                    </div>
                    <h3 class="text-lg font-black leading-tight mb-3">${recipe.nom}</h3>
                    <div class="flex gap-2">
                        <a href="${recipe.link}" target="_blank" class="flex-1 bg-white border border-amber-300 text-amber-700 py-3 rounded-xl text-center text-[11px] font-black">VEURE WEB</a>
                        <button onclick="autoSaveSuggestion('${safeNom}', '${safeIng}', '${safeMet}', '${safeLnk}')" class="flex-1 bg-orange-500 text-white py-3 rounded-xl text-[11px] font-black shadow-md">DESAR ＋</button>
                    </div>
                </div>
            `;
        }

        function updateUI() {
            ['all', 'favs', 'caducitat', 'export'].forEach(t => {
                const btn = document.getElementById('btn-' + t);
                if(btn) btn.classList.toggle('active-tab', activeTab === t);
            });
        }

        window.saveCaducitat = () => {
            const nom = document.getElementById('cad-nom').value;
            const data = document.getElementById('cad-data').value;
            if(!nom || !data) return;
            db.ref('aliments_caducitat').push({ nom, caducitat: data }).then(() => {
                document.getElementById('cad-nom').value = "";
                document.getElementById('cad-data').value = "";
                showToast("Afegit correctament");
            });
        };

        window.deleteCaducitat = (id) => {
            if (confirm("Eliminar caducitat?")) db.ref('aliments_caducitat').child(id).remove();
        };

        window.toggleFav = (id, val, e) => {
            if(e) e.stopPropagation();
            db.ref('aliments').child(id).update({ fav: val });
        };

        window.toggleProvar = (id, val, e) => {
            if(e) e.stopPropagation();
            db.ref('aliments').child(id).update({ provar: val });
        };

        window.autoSaveSuggestion = (nom, ing, met, lnk) => {
            const data = {
                nom, ingredients: ing || '', metode: met || '', link: lnk || '', fav: false, provar: true
            };
            db.ref('aliments').push(data).then(() => { showToast("Recepta guardada!"); });
        };

        window.openCreateAliment = (nom, ing, met, lnk) => {
            showModal(`
                <div class="p-8 space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-black">Nova Recepta</h2>
                        <button onclick="closeModal()" class="text-slate-400 text-2xl">×</button>
                    </div>
                    <div class="space-y-4">
                        <input id="new-nom" value="${nom || ''}" placeholder="Quin plat és?" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                        <textarea id="new-ing" placeholder="Ingredients..." class="w-full p-4 bg-slate-50 border rounded-2xl h-32 font-bold text-sm">${ing || ''}</textarea>
                        <textarea id="new-met" placeholder="Com es prepara?" class="w-full p-4 bg-slate-50 border rounded-2xl h-32 font-bold text-sm">${met || ''}</textarea>
                        <input id="new-link" type="url" value="${lnk || ''}" placeholder="Link web" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm">
                    </div>
                    <button onclick="saveNew()" class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black">CREAR RECEPTA</button>
                </div>
            `);
        };

        window.saveNew = () => {
            const nomInput = document.getElementById('new-nom');
            if(!nomInput || !nomInput.value) return showToast("Falta el nom");
            const data = {
                nom: nomInput.value,
                ingredients: document.getElementById('new-ing').value || '',
                metode: document.getElementById('new-met').value || '',
                link: document.getElementById('new-link').value || '',
                fav: false, provar: true
            };
            db.ref('aliments').push(data).then(() => { closeModal(); showToast("Recepta guardada!"); });
        };

        window.openEditById = (id) => {
            const a = allAliments.find(item => item.id === id);
            if(a) openEdit(a);
        };

        window.openEdit = (a) => {
            showModal(`
                <div class="p-8 space-y-6">
                    <div class="flex justify-between items-start">
                        <h2 class="text-xl font-black recipe-card-text">${a.nom || 'Sense nom'}</h2>
                        <div class="flex gap-3">
                            <button onclick="toggleFav('${a.id}', ${!a.fav})">${a.fav ? '❤️' : '🤍'}</button>
                            <button onclick="closeModal()" class="text-slate-400 text-2xl">×</button>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <textarea id="edit-ing" class="w-full p-4 bg-slate-50 border rounded-2xl h-24 text-sm font-bold">${a.ingredients || ''}</textarea>
                        <textarea id="edit-met" class="w-full p-4 bg-slate-50 border rounded-2xl h-32 text-sm font-bold">${a.metode || ''}</textarea>
                        <input id="edit-link" type="url" value="${a.link || ''}" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updateRecepta('${a.id}')" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black">DESAR</button>
                        <button onclick="deleteRecepta('${a.id}')" class="px-6 bg-red-100 text-red-500 rounded-2xl">🗑️</button>
                    </div>
                </div>
            `);
        };

        window.updateRecepta = (id) => {
            const upd = {
                ingredients: document.getElementById('edit-ing').value,
                metode: document.getElementById('edit-metode').value,
                link: document.getElementById('edit-link').value
            };
            db.ref('aliments').child(id).update(upd).then(() => { closeModal(); showToast("Actualitzat"); });
        };

        window.deleteRecepta = (id) => {
            if(confirm("Eliminar recepta?")) {
                db.ref('aliments').child(id).remove().then(() => { closeModal(); showToast("Eliminada"); });
            }
        };

        window.openSelector = (f, t) => {
            const itemsHtml = allAliments.sort((a,b) => (a.nom || "").localeCompare(b.nom || "")).map(a => {
                const safeNom = (a.nom || '').replace(/'/g, "\\'");
                return `
                    <div onclick="addAndClose('${f}','${t}','${safeNom}', this)" class="sel-item p-4 bg-slate-50 rounded-xl font-bold cursor-pointer hover:bg-orange-50 border transition-colors mb-2" data-name="${safeNom}">
                        ${a.nom || 'Sense nom'}
                    </div>
                `;
            }).join('');

            showModal(`
                <div class="p-8 space-y-4">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-black">ESCULL PLAT</h2>
                        <button onclick="closeModal()" class="text-slate-400 text-2xl font-bold">×</button>
                    </div>
                    <input type="text" id="sel-search" oninput="filterSel()" placeholder="Cerca un plat..." class="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:ring-2 focus:ring-orange-500 outline-none">
                    <div class="max-h-[60vh] overflow-y-auto no-scrollbar pt-2">
                        ${itemsHtml}
                    </div>
                </div>
            `);
            
            // Focus automàtic al cercador per anar ràpid
            setTimeout(() => document.getElementById('sel-search')?.focus(), 100);
        };

        window.addAndClose = (f, t, n, el) => {
            // Visual feedback
            el.classList.add('bg-orange-500', 'text-white', 'scale-95');
            
            const current = (allSelections[f] && Array.isArray(allSelections[f][t])) ? [...allSelections[f][t]] : [];
            current.push(n);
            
            db.ref('seleccions').child(f).child(t).set(current).then(() => {
                closeModal();
                showToast(`Afegit: ${n}`);
            });
        };

        window.filterSel = () => {
            const searchInput = document.getElementById('sel-search');
            if(!searchInput) return;
            const q = searchInput.value.toLowerCase();
            document.querySelectorAll('.sel-item').forEach(i => {
                i.style.display = i.dataset.name.toLowerCase().includes(q) ? 'block' : 'none';
            });
        };

        window.removePlat = (f, t, i) => {
            if(!allSelections[f] || !allSelections[f][t]) return;
            const p = [...allSelections[f][t]];
            p.splice(i, 1);
            db.ref('seleccions').child(f).child(t).set(p);
        };

        window.exportMenuCSV = () => {
            const startStr = document.getElementById('export-start').value;
            const endStr = document.getElementById('export-end').value;
            if(!startStr || !endStr) return showToast("Tria dates");
            let csv = "Data,Dinar,Sopar\n";
            let cur = new Date(startStr);
            let end = new Date(endStr);
            while(cur <= end) {
                const iso = cur.toISOString().split('T')[0];
                const dinar = (allSelections[iso]?.comida || []).join(' | ');
                const sopar = (allSelections[iso]?.cena || []).join(' | ');
                csv += `${iso},"${dinar}","${sopar}"\n`;
                cur.setDate(cur.getDate() + 1);
            }
            downloadCSV(csv, `menu_${startStr}_${endStr}.csv`);
        };

        function downloadCSV(content, filename) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", filename);
            link.click();
        }

        window.showModal = (html) => {
            const m = document.getElementById('modal-container');
            const c = document.getElementById('modal-content');
            if(c) c.innerHTML = html;
            if(m) m.classList.remove('hidden');
        };

        window.closeModal = () => {
            const m = document.getElementById('modal-container');
            if(m) m.classList.add('hidden');
        };
        
        window.closeModalExtern = (e) => {
            if(e.target.id === 'modal-container') closeModal();
        }

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1500);
        };

        window.handleActionClick = (e, link, query) => {
            e.stopPropagation();
            if (link) {
                window.open(link, '_blank');
            } else {
                const cleanQuery = query.replace(/['"]+/g, '');
                const googleSearchUrl = `https://www.google.com/search?q=recepta+${encodeURIComponent(cleanQuery)}`;
                window.open(googleSearchUrl, '_blank');
            }
        };
    </script>
</body>
</html>
