<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuina de Casa Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #f59e0b;
            --dark-card: #1e293b;
            --dark-today: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            padding-bottom: 120px;
            scroll-behavior: smooth;
        }

        .day-card-dark {
            background-color: var(--dark-card);
            color: white;
            border-radius: 2rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .today-card {
            border: 6px solid var(--primary) !important;
            background-color: var(--dark-today) !important;
            box-shadow: 0 0 25px -5px rgba(245, 158, 11, 0.4);
            transform: scale(1.02);
            z-index: 10;
        }

        .btn-add-dashed {
            width: 100%;
            border: 1px dashed rgba(255,255,255,0.3);
            border-radius: 1rem;
            padding: 10px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .item-row {
            background: rgba(255,255,255,0.08);
            border-radius: 0.75rem;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 6px;
            border-left: 3px solid var(--primary);
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            gap: 4px;
        }

        .active-tab {
            background-color: var(--primary) !important;
            color: white !important;
            transform: translateY(-4px);
        }

        .caducitat-alert {
            background-color: #fee2e2;
            color: #b91c1c;
            border-radius: 1rem;
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .caducitat-delete {
            background: rgba(185, 28, 28, 0.1);
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 10px;
            margin-left: 8px;
        }

        .recipe-card-text {
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            display: block;
            width: 100%;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #334155;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .food-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: transform 0.2s;
        }

        .action-btn-circle {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 18px;
            background: #f1f5f9;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn-circle.active-heart { background: #fee2e2; }
        .action-btn-circle.active-eyes { background: #e0f2fe; }

        .link-footer-btn {
            width: 100%;
            padding: 8px;
            background: #f8fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            border: 1px solid #f1f5f9;
        }

        .seasonal-suggestion {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border: 2px solid #fbbf24;
            border-radius: 2rem;
            padding: 1.25rem;
            margin-bottom: 2rem;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900">

    <div id="toast" class="toast">Acció realitzada correctament</div>

    <div id="app-root" class="max-w-md mx-auto px-4 py-6">
        
        <header class="flex flex-col gap-4 mb-8 text-center">
            <h1 class="text-2xl font-extrabold tracking-tight">El meu <span class="text-orange-500">Menú</span></h1>
            <div class="flex items-center justify-center gap-4 bg-white p-2 rounded-2xl shadow-sm border">
                <button onclick="changeWeek(-1)" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 font-bold">‹</button>
                <span id="rango-fechas" class="text-sm font-black text-slate-700 min-w-[140px]">...</span>
                <button onclick="changeWeek(1)" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 font-bold">〉</button>
            </div>
        </header>

        <div id="daily-suggestion-container"></div>
        <div id="calendar-grid" class="flex flex-col gap-6 mb-12"></div>

        <div id="dynamic-content" class="mb-12 hidden">
            <div id="list-tab-content" class="hidden">
                <input type="text" id="search-input" oninput="renderFoodGrid()" placeholder="Cerca receptes..." class="w-full p-4 bg-white rounded-2xl border shadow-sm mb-4 font-bold outline-none focus:ring-2 focus:ring-orange-500">
                <div id="main-grid" class="grid grid-cols-1 gap-4"></div>
            </div>

            <div id="caducitat-tab-content" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-orange-100">
                    <h3 class="font-black text-xs text-slate-400 uppercase mb-4">Nova Caducitat</h3>
                    <input type="text" id="cad-nom" placeholder="Què caduca?" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border mb-2 outline-none">
                    <div class="flex gap-2">
                        <input type="date" id="cad-data" class="flex-1 p-4 bg-slate-50 rounded-2xl font-bold border outline-none">
                        <button onclick="saveCaducitat()" class="bg-orange-500 text-white px-6 rounded-2xl font-black text-xs">DESAR</button>
                    </div>
                </div>
                <div id="cad-list-grid" class="space-y-3"></div>
            </div>

            <div id="export-tab-content" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4">
                    <h3 class="font-black text-[10px] uppercase text-slate-400 tracking-wider">Exportar Menú Setmanal</h3>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold block ml-1">DES DE:</label>
                        <input type="date" id="export-start" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-sm outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold block ml-1">FINS A:</label>
                        <input type="date" id="export-end" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-sm outline-none">
                    </div>
                    <button onclick="exportMenuCSV()" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-black text-xs">DESCARREGAR MENÚ (CSV)</button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t p-4 flex justify-around items-center z-50">
            <button onclick="setTab('all')" id="btn-all" class="p-3 text-xl rounded-2xl transition-all">📂</button>
            <button onclick="setTab('favs')" id="btn-favs" class="p-3 text-xl rounded-2xl transition-all">❤️</button>
            <button onclick="setTab('provar')" id="btn-provar" class="p-3 text-xl rounded-2xl transition-all">👀</button>
            <button onclick="openCreateAliment('', '', '', '')" class="bg-orange-500 text-white w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center text-xl hover:scale-110 transition-transform">＋</button>
            <button onclick="setTab('caducitat')" id="btn-caducitat" class="p-3 text-xl rounded-2xl transition-all">⌛</button>
            <button onclick="setTab('export')" id="btn-export" class="p-3 text-xl rounded-2xl transition-all">📊</button>
        </div>
    </div>

    <div id="modal-container" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onclick="closeModalExtern(event)">
        <div id="modal-content" class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar" onclick="event.stopPropagation()"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        let db;
        let offset = 0;
        let activeTab = 'none';
        let allAliments = [];
        let allSelections = {};
        let allCaducitats = {};

        const suggeriments = [
            { nom: "Faves a la Catalana", temps: "45 min", link: "https://www.bonviveur.es/recetas/habas-a-la-catalana", ingredients: "500g faves, cansalada, botifarra negra.", metode: "Daurar la cansalada. Afegir faves i menta. Coure a foc lent." },
            { nom: "Arròs amb Verdures", temps: "30 min", link: "https://www.directoalpaladar.com/recetas-de-arroces/arroz-verduras-receta-saludable-facil-deliciosa", ingredients: "Arròs, pebrot, ceba, pèsols.", metode: "Fer sofregit, afegir arròs i brou." },
            { nom: "Bacallà amb Samfaina", temps: "35 min", link: "https://www.bonviveur.es/recetas/bacalao-con-samfaina", ingredients: "Bacallà, albergínia, carbassó.", metode: "Fregir el bacallà i afegir samfaina." },
            { nom: "Pollastre al Forn", temps: "60 min", link: "https://www.directoalpaladar.com/recetas-de-carnes-y-aves/pollo-al-horno-receta-facil", ingredients: "Pollastre, patates, ceba.", metode: "Forn a 200ºC durant 45 min." }
        ];

        window.onload = initFirebase;

        function initFirebase() {
            const config = { databaseURL: "https://calendari-menjars-default-rtdb.europe-west1.firebasedatabase.app" };
            if (!firebase.apps.length) firebase.initializeApp(config);
            db = firebase.database();
            
            db.ref('aliments').on('value', s => {
                const val = s.val() || {};
                allAliments = Object.keys(val).map(key => ({ ...val[key], id: key }));
                render();
            });
            db.ref('seleccions').on('value', s => { allSelections = s.val() || {}; render(); });
            db.ref('aliments_caducitat').on('value', s => { 
                allCaducitats = s.val() || {}; 
                cleanExpiredCaducitats();
                render(); 
            });

            // Quan tot s'ha carregat inicialment, anem al dia d'avui
            setTimeout(scrollToToday, 800);
        }

        function scrollToToday() {
            const todayCard = document.querySelector('.today-card');
            if (todayCard && activeTab === 'none') {
                todayCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function cleanExpiredCaducitats() {
            const todayStr = new Date().toISOString().split('T')[0];
            Object.entries(allCaducitats).forEach(([id, item]) => {
                if (item.caducitat < todayStr) db.ref('aliments_caducitat').child(id).remove();
            });
        }

        function setTab(tab) {
            activeTab = (activeTab === tab) ? 'none' : tab;
            render();
            if(activeTab === 'none') setTimeout(scrollToToday, 100);
        }

        function changeWeek(dir) {
            offset += dir;
            render();
        }

        function render() {
            renderHeader();
            renderCalendar();
            renderDynamic();
            renderDailySuggestion();
            updateUI();
        }

        function renderHeader() {
            const d = new Date();
            const start = new Date(d.setDate(d.getDate() - (d.getDay() || 7) + 1 + (offset * 7)));
            const end = new Date(start); end.setDate(start.getDate() + 6);
            const r = document.getElementById('rango-fechas');
            if(r) r.innerText = `${start.getDate()}/${start.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            if(!grid) return;
            if(activeTab !== 'none') { grid.innerHTML = ""; return; }
            grid.innerHTML = "";
            const today = new Date().toISOString().split('T')[0];
            const d = new Date();
            const start = new Date(d.setDate(d.getDate() - (d.getDay() || 7) + 1 + (offset * 7)));
            const dies = ["DILLUNS", "DIMARTS", "DIMECRES", "DIJOUS", "DIVENDRES", "DISSABTE", "DIUMENGE"];
            
            for(let i=0; i<7; i++) {
                const cur = new Date(start); cur.setDate(start.getDate() + i);
                const iso = cur.toISOString().split('T')[0];
                const alertsEntries = Object.entries(allCaducitats).filter(([id, c]) => c && c.caducitat === iso);
                
                const card = document.createElement('div');
                card.className = `day-card-dark ${iso === today ? 'today-card' : ''}`;
                card.innerHTML = `
                    <div class="mb-4">
                        <span class="text-[10px] font-bold text-orange-400">${dies[i]}</span>
                        <h2 class="text-4xl font-black">${cur.getDate()}</h2>
                        <div class="mt-2 space-y-1">
                            ${alertsEntries.map(([id, a]) => `
                                <div class="caducitat-alert">
                                    <span class="truncate pr-1">⚠️ ${a.nom}</span>
                                    <button onclick="deleteCaducitat('${id}', true)" class="caducitat-delete">×</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="w-full text-left space-y-6">
                        <div>
                            <div class="section-label">☀️ DINAR</div>
                            <div id="list-${iso}-comida">${renderPlats(iso, 'comida')}</div>
                            <button onclick="openSelector('${iso}', 'comida')" class="btn-add-dashed">+ AFEGIR PLAT</button>
                        </div>
                        <div>
                            <div class="section-label">🌙 SOPAR</div>
                            <div id="list-${iso}-cena">${renderPlats(iso, 'cena')}</div>
                            <button onclick="openSelector('${iso}', 'cena')" class="btn-add-dashed">+ AFEGIR PLAT</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function renderPlats(fecha, tipo) {
            const p = (allSelections[fecha] && Array.isArray(allSelections[fecha][tipo])) ? allSelections[fecha][tipo] : [];
            return p.map((n, i) => `
                <div class="item-row">
                    <span class="text-sm font-bold recipe-card-text">${n}</span>
                    <button onclick="removePlat('${fecha}','${tipo}',${i})" class="text-white/20 hover:text-red-400 ml-2">×</button>
                </div>
            `).join('');
        }

        function renderDynamic() {
            const cont = document.getElementById('dynamic-content');
            const list = document.getElementById('list-tab-content');
            const cad = document.getElementById('caducitat-tab-content');
            const exp = document.getElementById('export-tab-content');
            
            if(cont) cont.classList.toggle('hidden', activeTab === 'none');
            if(list) list.classList.toggle('hidden', !['all', 'favs', 'provar'].includes(activeTab));
            if(cad) cad.classList.toggle('hidden', activeTab !== 'caducitat');
            if(exp) exp.classList.toggle('hidden', activeTab !== 'export');
            
            if(activeTab === 'caducitat') renderCadList();
            if(['all', 'favs', 'provar'].includes(activeTab)) renderFoodGrid();
        }

        function renderFoodGrid() {
            const grid = document.getElementById('main-grid');
            const search = document.getElementById('search-input')?.value.toLowerCase() || "";
            if(!grid) return;
            grid.innerHTML = "";
            let filtered = allAliments.filter(a => (a.nom || "").toLowerCase().includes(search));
            if(activeTab === 'favs') filtered = filtered.filter(a => a.fav);
            if(activeTab === 'provar') filtered = filtered.filter(a => a.provar);
            
            filtered.sort((a,b) => (a.nom || "").localeCompare(b.nom || "")).forEach(a => {
                const div = document.createElement('div');
                div.className = "food-card cursor-pointer";
                div.innerHTML = `
                    <div class="flex items-center justify-between gap-4">
                        <div class="action-btn-circle ${a.fav ? 'active-heart' : ''}" onclick="toggleFav('${a.id}', ${!a.fav}, event)">${a.fav ? '❤️' : '🤍'}</div>
                        <div class="text-center flex-1" onclick="openEditById('${a.id}')">
                            <div class="text-sm font-black leading-tight">${a.nom || 'Sense nom'}</div>
                        </div>
                        <div class="action-btn-circle ${a.provar ? 'active-eyes' : ''}" onclick="toggleProvar('${a.id}', ${!a.provar}, event)">${a.provar ? '👀' : '👁️'}</div>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function renderDailySuggestion() {
            const container = document.getElementById('daily-suggestion-container');
            if (!container) return;
            if (activeTab !== 'none') { container.innerHTML = ""; return; }
            const day = new Date().getDate();
            const recipe = suggeriments[day % suggeriments.length];
            container.innerHTML = `
                <div class="seasonal-suggestion">
                    <span class="text-[10px] font-black text-orange-600 bg-orange-200 px-2 py-1 rounded-lg">SUGGERIMENT DEL DIA 🌿</span>
                    <h3 class="text-lg font-black leading-tight mb-3 mt-2">${recipe.nom}</h3>
                    <div class="flex gap-2">
                        <a href="${recipe.link}" target="_blank" class="flex-1 bg-white border border-amber-300 py-3 rounded-xl text-center text-[11px] font-black">VEURE WEB</a>
                        <button onclick="autoSaveSuggestion('${recipe.nom.replace(/'/g, "\\'")}', '', '', '${recipe.link}')" class="flex-1 bg-orange-500 text-white py-3 rounded-xl text-[11px] font-black">DESAR ＋</button>
                    </div>
                </div>
            `;
        }

        function updateUI() {
            ['all', 'favs', 'provar', 'caducitat', 'export'].forEach(t => {
                const btn = document.getElementById('btn-' + t);
                if(btn) btn.classList.toggle('active-tab', activeTab === t);
            });
        }

        function showToast(txt) {
            const t = document.getElementById('toast');
            t.innerText = txt;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function showModal(content) {
            const container = document.getElementById('modal-container');
            const inner = document.getElementById('modal-content');
            inner.innerHTML = content;
            container.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }

        function closeModalExtern(e) {
            if(e.target.id === 'modal-container') closeModal();
        }

        window.openSelector = (f, t) => {
            const itemsHtml = allAliments.sort((a,b) => (a.nom || "").localeCompare(b.nom || "")).map(a => `
                <div onclick="addAndClose('${f}','${t}','${a.nom.replace(/'/g, "\\'")}')" class="p-4 bg-slate-50 rounded-xl font-bold cursor-pointer hover:bg-orange-50 mb-2">
                    ${a.nom}
                </div>
            `).join('');

            showModal(`
                <div class="p-8">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-black">ESCULL PLAT</h2>
                        <button onclick="closeModal()" class="text-slate-400 text-2xl font-bold">×</button>
                    </div>
                    <div class="max-h-[60vh] overflow-y-auto no-scrollbar">${itemsHtml}</div>
                </div>
            `);
        };

        window.addAndClose = (f, t, n) => {
            const current = (allSelections[f] && Array.isArray(allSelections[f][t])) ? allSelections[f][t] : [];
            current.push(n);
            db.ref('seleccions').child(f).child(t).set(current).then(() => {
                closeModal();
                showToast("Afegit!");
            });
        };

        window.removePlat = (f, t, idx) => {
            const current = allSelections[f][t];
            current.splice(idx, 1);
            db.ref('seleccions').child(f).child(t).set(current);
        };

        window.toggleFav = (id, v, e) => { if(e) e.stopPropagation(); db.ref('aliments').child(id).update({ fav: v }); };
        window.toggleProvar = (id, v, e) => { if(e) e.stopPropagation(); db.ref('aliments').child(id).update({ provar: v }); };
        
        window.autoSaveSuggestion = (n, i, m, l) => {
            db.ref('aliments').push({ nom: n, ingredients: i, metode: m, link: l, fav: false, provar: true })
              .then(() => showToast("Guardat!"));
        };

        window.openCreateAliment = () => {
            showModal(`
                <div class="p-8 space-y-4">
                    <h2 class="text-xl font-black">Nova Recepta</h2>
                    <input id="new-nom" placeholder="Nom del plat" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                    <button onclick="saveNew()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black">CREAR</button>
                </div>
            `);
        };

        window.saveNew = () => {
            const n = document.getElementById('new-nom').value;
            if(!n) return;
            db.ref('aliments').push({ nom: n, fav: false, provar: true }).then(() => { closeModal(); showToast("Creat!"); });
        };
    </script>
</body>
</html>
