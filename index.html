<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuina de Casa Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #f59e0b;
            --dark-card: #1e293b;
            --dark-bg: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            padding-bottom: 120px;
            scroll-behavior: smooth;
        }

        .day-card-dark {
            background-color: var(--dark-card);
            color: white;
            border-radius: 2.5rem;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .btn-add-dashed {
            width: 100%;
            border: 1px dashed rgba(255,255,255,0.3);
            border-radius: 1rem;
            padding: 12px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-add-dashed:active {
            background: rgba(255,255,255,0.05);
            transform: scale(0.98);
        }

        .item-row {
            background: rgba(255,255,255,0.08);
            border-radius: 1rem;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 8px;
            border-left: 3px solid var(--primary);
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--primary);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .active-tab {
            background-color: var(--primary) !important;
            color: white !important;
        }

        .export-area {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 -10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            margin-top: 1rem;
        }

        .caducitat-alert {
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            border-radius: 1rem;
            padding: 10px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 10px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .today-card {
            border: 3px solid var(--primary);
            box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.3);
        }
    </style>
</head>
<body class="text-slate-900">

    <div id="app-root" class="max-w-md mx-auto md:max-w-4xl px-4 py-6">
        
        <header class="flex flex-col gap-4 mb-8 text-center">
            <h1 class="text-2xl font-extrabold tracking-tight">El meu <span class="text-orange-500">Menú</span></h1>
            
            <div class="flex items-center justify-center gap-4 bg-white p-2 rounded-2xl shadow-sm border mt-2">
                <button id="btn-prev" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 font-bold">‹</button>
                <span id="rango-fechas" class="text-sm font-black text-slate-700 min-w-[140px] text-center">...</span>
                <button id="btn-next" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 font-bold">〉</button>
            </div>
        </header>

        <section id="calendar-section" class="space-y-6 mb-12">
            <div id="calendar-grid" class="flex flex-col gap-6"></div>
        </section>

        <div id="dynamic-content" class="mb-12 hidden">
            <div id="export-tab-content" class="hidden export-area space-y-4">
                <h3 class="font-bold text-sm text-slate-800">Exportar dades a CSV</h3>
                <button onclick="exportAlimentsCSV()" class="w-full py-4 bg-slate-100 rounded-2xl font-bold text-xs text-slate-600 active:scale-95 transition-all">📥 Exportar Llista d'Aliments</button>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Menú per mes:</label>
                    <div class="flex gap-2">
                        <input type="month" id="export-month" class="flex-1 p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none ring-1 ring-slate-200 outline-none focus:ring-orange-500">
                        <button onclick="exportMenuCSV()" class="bg-orange-500 text-white px-6 rounded-2xl font-bold text-xs whitespace-nowrap active:scale-95 transition-all">Exportar</button>
                    </div>
                </div>
            </div>

            <div id="list-tab-content" class="hidden">
                <input type="text" id="search-input" placeholder="Cerca receptes..." class="w-full p-4 bg-white rounded-2xl border-none shadow-sm mb-4 font-bold outline-none ring-1 ring-slate-100 focus:ring-orange-500">
                <div id="main-grid" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t p-4 flex justify-around items-center z-50">
            <button onclick="setTab('all')" id="btn-all" class="p-3 rounded-2xl transition-all">📂</button>
            <button onclick="setTab('favs')" id="btn-favs" class="p-3 rounded-2xl transition-all">❤️</button>
            <button onclick="openCreateAliment()" class="bg-orange-500 text-white w-12 h-12 rounded-2xl shadow-lg shadow-orange-200 flex items-center justify-center text-xl">＋</button>
            <button onclick="setTab('caducitat')" id="btn-caducitat" class="p-3 rounded-2xl transition-all">⌛</button>
            <button onclick="setTab('export')" id="btn-export" class="p-3 rounded-2xl transition-all">📊</button>
        </div>
    </div>

    <div id="modal-container" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden overflow-y-auto max-h-[90vh] no-scrollbar"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        let db;
        let offset = 0;
        let activeTab = 'none'; 
        let allAliments = [];
        let allSelections = {};
        let allCaducitats = {};
        let initialScrollDone = false;

        const diesSetmana = ["DIUMENGE", "DILLUNS", "DIMARTS", "DIMECRES", "DIJOUS", "DIVENDRES", "DISSABTE"];
        const nomsMesos = ["GENER", "FEBRER", "MARÇ", "ABRIL", "MAIG", "JUNY", "JULIOL", "AGOST", "SETEMBRE", "OCTUBRE", "NOVEMBRE", "DESEMBRE"];

        function initFirebase() {
            const config = { databaseURL: "https://calendari-menjars-default-rtdb.europe-west1.firebasedatabase.app" };
            if (!firebase.apps.length) firebase.initializeApp(config);
            db = firebase.database();
            
            db.ref('aliments').on('value', s => {
                const data = s.val() || {};
                allAliments = Object.keys(data).map(key => ({ ...data[key], id: key })).sort((a,b) => (a.nom || "").localeCompare(b.nom || ""));
                render();
            });

            db.ref('seleccions').on('value', s => { 
                allSelections = s.val() || {}; 
                render(); 
                // Provocar el scroll un cop tenim dades de seleccions (que indica que la càrrega va avançada)
                if (!initialScrollDone) scrollToToday();
            });

            db.ref('aliments_caducitat').on('value', s => {
                allCaducitats = s.val() || {};
                render();
            });
        }

        // Funció per anar directament al dia d'avui
        function scrollToToday() {
            if (initialScrollDone) return;
            
            // Forçarem el render del calendari abans de buscar l'element
            renderCalendar();
            
            setTimeout(() => {
                const todayCard = document.querySelector('.today-card');
                if (todayCard) {
                    todayCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    initialScrollDone = true;
                }
            }, 300);
        }

        window.setTab = function(tab) {
            activeTab = (activeTab === tab) ? 'none' : tab;
            render();
            if (activeTab !== 'none') {
                setTimeout(() => {
                    const el = document.getElementById('dynamic-content');
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            }
        };

        function render() {
            renderHeader();
            renderCalendar();
            renderDynamicContent();
            updateUIState();
        }

        function renderHeader() {
            const hoy = new Date();
            const day = hoy.getDay(), diff = hoy.getDate() - (day == 0 ? 6 : day - 1);
            const lunes = new Date(new Date().setDate(diff + (offset * 7)));
            const dom = new Date(lunes); dom.setDate(lunes.getDate() + 6);
            document.getElementById('rango-fechas').innerText = `${lunes.getDate()}/${lunes.getMonth()+1} – ${dom.getDate()}/${dom.getMonth()+1}`;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            if (!grid) return;
            grid.innerHTML = "";
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const day = hoy.getDay(), diff = hoy.getDate() - (day == 0 ? 6 : day - 1);
            const lunes = new Date(new Date().setDate(diff + (offset * 7)));

            for (let i = 0; i < 7; i++) {
                const curr = new Date(lunes); curr.setDate(lunes.getDate() + i);
                const iso = curr.toISOString().split('T')[0];
                const esHoy = curr.getTime() === hoy.getTime();
                
                let alertsHtml = "";
                Object.keys(allCaducitats).forEach(key => {
                    if (allCaducitats[key] && allCaducitats[key].caducitat === iso) {
                        alertsHtml += `
                            <div class="caducitat-alert">
                                <span>⚠️</span>
                                <span class="truncate">${allCaducitats[key].nom || "Aliment"} caduca</span>
                            </div>`;
                    }
                });

                const card = document.createElement('div');
                card.id = `day-${iso}`;
                card.className = `day-card-dark ${esHoy ? 'today-card' : ''}`;
                card.innerHTML = `
                    <div class="mb-4">
                        <p class="text-[10px] font-extrabold tracking-widest ${esHoy ? 'text-orange-400' : 'text-slate-400'} mb-1">${diesSetmana[curr.getDay()]}</p>
                        <h2 class="text-5xl font-black leading-none">${curr.getDate()}</h2>
                        <p class="text-[11px] font-bold text-orange-400 mt-2 tracking-widest">${nomsMesos[curr.getMonth()]}</p>
                        ${alertsHtml}
                    </div>
                    <div class="w-full space-y-8 mt-4 text-left">
                        <div>
                            <div class="section-label"><span>☀️</span> DINAR</div>
                            <div class="space-y-2">${renderPlats(iso, 'comida')}</div>
                            <button onclick="openSelector('${iso}', 'comida')" class="btn-add-dashed">+ AFegir</button>
                        </div>
                        <div>
                            <div class="section-label"><span>🌙</span> SOPAR</div>
                            <div class="space-y-2">${renderPlats(iso, 'cena')}</div>
                            <button onclick="openSelector('${iso}', 'cena')" class="btn-add-dashed">+ AFegir</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function renderPlats(fecha, tipo) {
            const plats = allSelections[fecha]?.[tipo] || [];
            if (plats.length === 0) return '';
            return plats.map((n, idx) => `
                <div class="item-row">
                    <span class="text-sm font-bold truncate">${n}</span>
                    <button onclick="delPlatSetmanal('${fecha}','${tipo}',${idx})" class="text-white/30 hover:text-red-400 text-lg">×</button>
                </div>
            `).join('');
        }

        function renderDynamicContent() {
            const container = document.getElementById('dynamic-content');
            if (!container) return;
            const exportTab = document.getElementById('export-tab-content');
            const listTab = document.getElementById('list-tab-content');
            
            if (activeTab === 'none') {
                container.classList.add('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            if (activeTab === 'export') {
                exportTab.classList.remove('hidden');
                listTab.classList.add('hidden');
            } else {
                exportTab.classList.add('hidden');
                listTab.classList.remove('hidden');
                renderFoodGrid();
            }
        }

        function renderFoodGrid() {
            const grid = document.getElementById('main-grid');
            if (!grid) return;
            grid.innerHTML = "";
            const searchInput = document.getElementById('search-input');
            const search = searchInput ? searchInput.value.toLowerCase() : "";
            
            let filtered = allAliments.filter(a => a && a.nom && a.nom.toLowerCase().includes(search));
            if (activeTab === 'favs') filtered = filtered.filter(a => a.fav);
            
            if (activeTab === 'caducitat') {
                const keys = Object.keys(allCaducitats);
                if (keys.length === 0) {
                    grid.innerHTML = "<div class='col-span-full p-8 text-center text-slate-400 font-bold italic'>No hi ha alertes de caducitat actives</div>";
                    return;
                }
                keys.forEach(key => {
                    const item = allCaducitats[key];
                    if (!item) return;
                    const div = document.createElement('div');
                    div.className = "bg-red-50 p-4 rounded-2xl border border-red-100 shadow-sm col-span-2 md:col-span-1";
                    div.innerHTML = `
                        <div class="text-[12px] font-black text-red-700">${item.nom || "Aliment"}</div>
                        <div class="text-[10px] font-bold text-red-400 mt-1 uppercase">Caduca: ${item.caducitat || "Sense data"}</div>
                        <button onclick="delCaducitat('${key}')" class="mt-3 text-[10px] font-bold text-red-300 underline">ELIMINAR AVÍS</button>
                    `;
                    grid.appendChild(div);
                });
                return;
            }

            filtered.forEach(a => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl border shadow-sm cursor-pointer active:scale-95 transition-all";
                div.onclick = () => openEditAliment(a.id);
                div.innerHTML = `
                    <div class="text-[13px] font-black text-slate-700 leading-tight">${a.nom}</div>
                    <div class="mt-2 flex gap-1">
                        ${a.fav ? '<span class="text-[10px]">❤️</span>' : ''}
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        window.exportAlimentsCSV = function() {
            let csv = "Nom,Ingredients,Preferit\n";
            allAliments.forEach(a => {
                csv += `"${a.nom || ""}","${(a.ingredients || '').replace(/"/g, '""')}",${a.fav ? "Sí" : "No"}\n`;
            });
            downloadCSV(csv, "aliments.csv");
        };

        window.exportMenuCSV = function() {
            const input = document.getElementById('export-month');
            const monthVal = input ? input.value : "";
            if(!monthVal) return;
            let csv = "Data,Dinar,Sopar\n";
            Object.keys(allSelections).filter(d => d.startsWith(monthVal)).sort().forEach(date => {
                const dinar = (allSelections[date].comida || []).join(" | ");
                const sopar = (allSelections[date].cena || []).join(" | ");
                csv += `${date},"${dinar}","${sopar}"\n`;
            });
            downloadCSV(csv, `menu_${monthVal}.csv`);
        };

        function downloadCSV(content, filename) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", filename);
            link.click();
        }

        window.delCaducitat = (key) => confirm("Eliminar?") && db.ref('aliments_caducitat/' + key).remove();

        window.openSelector = function(fecha, tipo) {
            showModal(`
                <div class="p-8 space-y-6">
                    <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Afegir al ${tipo === 'comida' ? 'Dinar' : 'Sopar'}</h3>
                    <input type="text" id="modal-search" placeholder="Busca recepta..." oninput="filterModalRecipes('${fecha}', '${tipo}')" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none ring-2 ring-slate-100 focus:ring-orange-500 outline-none">
                    <div id="modal-recipe-list" class="space-y-2 max-h-64 overflow-y-auto no-scrollbar"></div>
                    <button onclick="closeModal()" class="w-full py-4 text-slate-400 font-bold">Tancar</button>
                </div>
            `);
            filterModalRecipes(fecha, tipo);
        };

        window.filterModalRecipes = function(fecha, tipo) {
            const searchInput = document.getElementById('modal-search');
            const txt = searchInput ? searchInput.value.toLowerCase() : "";
            const list = document.getElementById('modal-recipe-list');
            if (!list) return;
            list.innerHTML = "";
            allAliments.filter(a => a && a.nom && a.nom.toLowerCase().includes(txt)).forEach(a => {
                const item = document.createElement('div');
                item.className = "p-4 bg-slate-50 hover:bg-orange-50 rounded-2xl cursor-pointer font-bold text-sm flex justify-between items-center transition-all";
                item.onclick = () => {
                    let plats = Array.isArray(allSelections[fecha]?.[tipo]) ? [...allSelections[fecha][tipo]] : [];
                    plats.push(a.nom);
                    db.ref(`seleccions/${fecha}/${tipo}`).set(plats).then(closeModal);
                };
                item.innerHTML = `<span>${a.nom}</span> <span class="text-orange-500 font-black">＋</span>`;
                list.appendChild(item);
            });
        };

        window.delPlatSetmanal = (fecha, tipo, idx) => {
            let plats = [...(allSelections[fecha][tipo] || [])];
            plats.splice(idx, 1);
            db.ref(`seleccions/${fecha}/${tipo}`).set(plats);
        };

        window.openCreateAliment = () => {
            showModal(`
                <div class="p-8 space-y-6">
                    <h3 class="text-xl font-black">Nova Recepta</h3>
                    <input type="text" id="m-nom" placeholder="Nom del plat..." class="w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none">
                    <textarea id="m-ingredients" placeholder="Ingredients..." class="w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none h-24"></textarea>
                    <button onclick="saveNewAliment()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black">CREAR</button>
                    <button onclick="closeModal()" class="w-full py-2 text-slate-400 font-bold">Tancar</button>
                </div>
            `);
        };

        window.saveNewAliment = () => {
            const nomEl = document.getElementById('m-nom');
            const ingEl = document.getElementById('m-ingredients');
            const nom = nomEl ? nomEl.value : "";
            if(!nom) return;
            db.ref('aliments').push({ nom, ingredients: (ingEl ? ingEl.value : "") || "", fav: false }).then(closeModal);
        };

        window.openEditAliment = (id) => {
            const a = allAliments.find(x => x.id === id);
            if (!a) return;
            showModal(`
                <div class="p-8 space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xl font-black">${a.nom}</h3>
                        <button onclick="toggleFav('${a.id}', ${!a.fav})" class="text-2xl">${a.fav ? '❤️' : '🤍'}</button>
                    </div>
                    <textarea id="e-ingredients" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none h-32">${a.ingredients || ''}</textarea>
                    <div class="flex gap-2">
                        <button onclick="updateAliment('${id}')" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black">DESAR</button>
                        <button onclick="deleteAliment('${id}')" class="px-6 bg-red-50 text-red-500 rounded-2xl font-black">🗑️</button>
                    </div>
                    <button onclick="closeModal()" class="w-full py-2 text-slate-400 font-bold">Tancar</button>
                </div>
            `);
        };

        window.toggleFav = (id, val) => db.ref('aliments/' + id).update({ fav: val }).then(closeModal);
        window.updateAliment = (id) => {
            const el = document.getElementById('e-ingredients');
            db.ref('aliments/' + id).update({ ingredients: el ? el.value : "" }).then(closeModal);
        };
        window.deleteAliment = (id) => confirm("Eliminar?") && db.ref('aliments/' + id).remove().then(closeModal);

        function showModal(html) {
            const content = document.getElementById('modal-content');
            if (content) content.innerHTML = html;
            const container = document.getElementById('modal-container');
            if (container) container.classList.remove('hidden');
        }
        window.closeModal = () => {
            const container = document.getElementById('modal-container');
            if (container) container.classList.add('hidden');
        };

        function updateUIState() {
            ['all', 'favs', 'caducitat', 'export'].forEach(t => {
                const btn = document.getElementById('btn-'+t);
                if (btn) btn.classList.toggle('active-tab', activeTab === t);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
            const prev = document.getElementById('btn-prev');
            const next = document.getElementById('btn-next');
            const search = document.getElementById('search-input');
            const container = document.getElementById('modal-container');

            if (prev) prev.onclick = () => { offset--; render(); };
            if (next) next.onclick = () => { offset++; render(); };
            if (search) search.oninput = render;
            if (container) container.onclick = (e) => e.target.id === 'modal-container' && closeModal();
        });
    </script>
</body>
</html>
