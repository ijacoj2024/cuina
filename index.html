<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuina de Casa Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #f59e0b;
            --dark-card: #1e293b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            padding-bottom: 120px;
        }

        .day-card-dark {
            background-color: var(--dark-card);
            color: white;
            border-radius: 2rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .btn-add-dashed {
            width: 100%;
            border: 1px dashed rgba(255,255,255,0.3);
            border-radius: 1rem;
            padding: 10px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .item-row {
            background: rgba(255,255,255,0.08);
            border-radius: 0.75rem;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 6px;
            border-left: 3px solid var(--primary);
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            gap: 4px;
        }

        .active-tab {
            background-color: var(--primary) !important;
            color: white !important;
        }

        .caducitat-alert {
            background-color: #fee2e2;
            color: #b91c1c;
            border-radius: 0.75rem;
            padding: 8px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
            width: 100%;
        }
        
        .today-card {
            border: 3px solid var(--primary);
        }

        .recipe-card-text {
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            display: block;
            width: 100%;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #334155;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
            display: none;
        }

        /* Estils per a les noves icones separades */
        .food-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: transform 0.2s;
        }

        .food-card:active {
            transform: scale(0.98);
        }

        .action-btn-circle {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 18px;
            background: #f1f5f9;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn-circle.active-heart { background: #fee2e2; }
        .action-btn-circle.active-eyes { background: #e0f2fe; }

        .link-footer-btn {
            width: 100%;
            padding: 8px;
            background: #f8fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            border: 1px solid #f1f5f9;
        }
    </style>
</head>
<body class="text-slate-900">

    <div id="toast" class="toast">Acció realitzada correctament</div>

    <div id="app-root" class="max-w-md mx-auto px-4 py-6">
        
        <header class="flex flex-col gap-4 mb-8 text-center">
            <h1 class="text-2xl font-extrabold tracking-tight">El meu <span class="text-orange-500">Menú</span></h1>
            <div class="flex items-center justify-center gap-4 bg-white p-2 rounded-2xl shadow-sm border">
                <button onclick="changeWeek(-1)" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 font-bold">‹</button>
                <span id="rango-fechas" class="text-sm font-black text-slate-700 min-w-[140px]">...</span>
                <button onclick="changeWeek(1)" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 font-bold">〉</button>
            </div>
        </header>

        <div id="calendar-grid" class="flex flex-col gap-6 mb-12"></div>

        <div id="dynamic-content" class="mb-12 hidden">
            <!-- Cercador -->
            <div id="list-tab-content" class="hidden">
                <input type="text" id="search-input" placeholder="Cerca receptes..." class="w-full p-4 bg-white rounded-2xl border shadow-sm mb-4 font-bold outline-none focus:ring-2 focus:ring-orange-500">
                <div id="main-grid" class="grid grid-cols-1 gap-4"></div>
            </div>

            <!-- Caducitats -->
            <div id="caducitat-tab-content" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-orange-100">
                    <h3 class="font-black text-xs text-slate-400 uppercase mb-4">Nova Caducitat</h3>
                    <input type="text" id="cad-nom" placeholder="Què caduca?" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border mb-2 outline-none">
                    <div class="flex gap-2">
                        <input type="date" id="cad-data" class="flex-1 p-4 bg-slate-50 rounded-2xl font-bold border outline-none">
                        <button onclick="saveCaducitat()" class="bg-orange-500 text-white px-6 rounded-2xl font-black text-xs">DESAR</button>
                    </div>
                </div>
                <div id="cad-list-grid" class="space-y-3"></div>
            </div>

            <!-- Exportar -->
            <div id="export-tab-content" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4">
                    <h3 class="font-bold text-xs uppercase text-slate-400">Exportar Menú Setmanal</h3>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold block ml-1">DES DE:</label>
                        <input type="date" id="export-start" class="w-full p-3 bg-slate-50 rounded-xl border font-bold text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold block ml-1">FINS A:</label>
                        <input type="date" id="export-end" class="w-full p-3 bg-slate-50 rounded-xl border font-bold text-sm">
                    </div>
                    <button onclick="exportMenuCSV()" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-black text-xs shadow-lg shadow-orange-100">DESCARREGAR MENÚ (CSV)</button>
                </div>

                <div class="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4">
                    <h3 class="font-bold text-xs uppercase text-slate-400">Base de Dades</h3>
                    <button onclick="exportReceptesCSV()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs">DESCARREGAR TOTES LES RECEPTES (CSV)</button>
                </div>
            </div>
        </div>

        <!-- Menu Inferior -->
        <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t p-4 flex justify-around items-center z-50">
            <button onclick="setTab('all')" id="btn-all" class="p-3 text-xl rounded-2xl transition-all">📂</button>
            <button onclick="setTab('favs')" id="btn-favs" class="p-3 text-xl rounded-2xl transition-all">❤️</button>
            <button onclick="openCreateAliment()" class="bg-orange-500 text-white w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center text-xl">＋</button>
            <button onclick="setTab('caducitat')" id="btn-caducitat" class="p-3 text-xl rounded-2xl transition-all">⌛</button>
            <button onclick="setTab('export')" id="btn-export" class="p-3 text-xl rounded-2xl transition-all">📊</button>
        </div>
    </div>

    <div id="modal-container" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-y-auto max-h-[90vh]"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        let db;
        let offset = 0;
        let activeTab = 'none';
        let allAliments = [];
        let allSelections = {};
        let allCaducitats = {};

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        window.deleteCaducitat = (id) => {
            if (!confirm("Vols eliminar aquest avís de caducitat?")) return;
            db.ref('aliments_caducitat').child(id).remove().then(() => window.showToast("Caducitat eliminada"));
        };

        window.deleteRecepta = (id) => {
            if (!confirm("Vols eliminar aquesta recepta de la base de dades?")) return;
            db.ref('aliments').child(id).remove().then(() => { closeModal(); window.showToast("Recepta eliminada"); });
        };

        window.updateRecepta = (id) => {
            const updates = {
                ingredients: document.getElementById('edit-ing').value || '',
                metode: document.getElementById('edit-met').value || '',
                link: document.getElementById('edit-link').value || ''
            };
            db.ref('aliments').child(id).update(updates).then(() => { closeModal(); window.showToast("Recepta actualitzada"); });
        };

        window.saveCaducitat = () => {
            const nom = document.getElementById('cad-nom').value;
            const data = document.getElementById('cad-data').value;
            if(!nom || !data) return;
            db.ref('aliments_caducitat').push({ nom, caducitat: data }).then(() => {
                document.getElementById('cad-nom').value = "";
                document.getElementById('cad-data').value = "";
                window.showToast("Afegit correctament");
            });
        };

        window.saveNew = () => {
            const nom = document.getElementById('new-nom').value;
            const ingredients = document.getElementById('new-ing').value;
            const metode = document.getElementById('new-met').value;
            const link = document.getElementById('new-link').value;
            if(!nom) { window.showToast("El nom és obligatori"); return; }
            db.ref('aliments').push({ nom, ingredients: ingredients || '', metode: metode || '', link: link || '', fav: false, provar: false }).then(() => { closeModal(); window.showToast("Recepta creada!"); });
        };

        window.toggleFav = (id, val, e) => {
            if(e) e.stopPropagation();
            db.ref('aliments').child(id).update({ fav: val });
        };

        window.toggleProvar = (id, val, e) => {
            if(e) e.stopPropagation();
            db.ref('aliments').child(id).update({ provar: val });
        };

        window.removePlat = (f, t, i) => {
            if(!allSelections[f] || !allSelections[f][t]) return;
            const p = [...allSelections[f][t]];
            p.splice(i, 1);
            db.ref('seleccions').child(f).child(t).set(p);
        };

        window.addPlat = (f, t, n) => {
            const p = (allSelections[f] && Array.isArray(allSelections[f][t])) ? [...allSelections[f][t]] : [];
            p.push(n);
            db.ref('seleccions').child(f).child(t).set(p).then(closeModal);
        };

        window.closeModal = () => {
            const c = document.getElementById('modal-container');
            if(c) c.classList.add('hidden');
        };

        window.handleActionClick = (e, link, query) => {
            e.stopPropagation();
            if (link) {
                window.open(link, '_blank');
            } else {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query + ' recepta')}`, '_blank');
            }
        };

        function initFirebase() {
            const config = { databaseURL: "https://calendari-menjars-default-rtdb.europe-west1.firebasedatabase.app" };
            if (!firebase.apps.length) firebase.initializeApp(config);
            db = firebase.database();
            db.ref('aliments').on('value', s => {
                const val = s.val() || {};
                allAliments = Object.keys(val).map(key => ({ ...val[key], id: key }));
                render();
            });
            db.ref('seleccions').on('value', s => { allSelections = s.val() || {}; render(); });
            db.ref('aliments_caducitat').on('value', s => { allCaducitats = s.val() || {}; render(); });
        }

        function render() {
            renderHeader();
            renderCalendar();
            renderDynamic();
            updateUI();
        }

        function renderHeader() {
            const d = new Date();
            const start = new Date(d.setDate(d.getDate() - (d.getDay() || 7) + 1 + (offset * 7)));
            const end = new Date(start); end.setDate(start.getDate() + 6);
            const r = document.getElementById('rango-fechas');
            if(r) r.innerText = `${start.getDate()}/${start.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            if(!grid) return;
            grid.innerHTML = "";
            const today = new Date().toISOString().split('T')[0];
            const d = new Date();
            const start = new Date(d.setDate(d.getDate() - (d.getDay() || 7) + 1 + (offset * 7)));
            const dies = ["DILLUNS", "DIMARTS", "DIMECRES", "DIJOUS", "DIVENDRES", "DISSABTE", "DIUMENGE"];
            for(let i=0; i<7; i++) {
                const cur = new Date(start); cur.setDate(start.getDate() + i);
                const iso = cur.toISOString().split('T')[0];
                const alerts = Object.values(allCaducitats).filter(c => c && c.caducitat === iso);
                const card = document.createElement('div');
                card.className = `day-card-dark ${iso === today ? 'today-card' : ''}`;
                card.innerHTML = `
                    <div class="mb-4">
                        <span class="text-[10px] font-bold text-orange-400">${dies[i]}</span>
                        <h2 class="text-4xl font-black">${cur.getDate()}</h2>
                        ${alerts.map(a => `<div class="caducitat-alert">⚠️ ${a.nom}</div>`).join('')}
                    </div>
                    <div class="w-full text-left space-y-6">
                        <div>
                            <div class="section-label">☀️ DINAR</div>
                            ${renderPlats(iso, 'comida')}
                            <button onclick="openSelector('${iso}', 'comida')" class="btn-add-dashed">+ AFEGIR</button>
                        </div>
                        <div>
                            <div class="section-label">🌙 SOPAR</div>
                            ${renderPlats(iso, 'cena')}
                            <button onclick="openSelector('${iso}', 'cena')" class="btn-add-dashed">+ AFEGIR</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function renderPlats(fecha, tipo) {
            const p = (allSelections[fecha] && allSelections[fecha][tipo]) ? allSelections[fecha][tipo] : [];
            return p.map((n, i) => `
                <div class="item-row">
                    <span class="text-sm font-bold recipe-card-text">${n}</span>
                    <button onclick="removePlat('${fecha}','${tipo}',${i})" class="text-white/20 hover:text-red-400 ml-2 shrink-0">×</button>
                </div>
            `).join('');
        }

        function renderDynamic() {
            const cont = document.getElementById('dynamic-content');
            const list = document.getElementById('list-tab-content');
            const cad = document.getElementById('caducitat-tab-content');
            const exp = document.getElementById('export-tab-content');
            if(cont) cont.classList.toggle('hidden', activeTab === 'none');
            if(list) list.classList.toggle('hidden', !['all', 'favs'].includes(activeTab));
            if(cad) cad.classList.toggle('hidden', activeTab !== 'caducitat');
            if(exp) exp.classList.toggle('hidden', activeTab !== 'export');
            if(activeTab === 'caducitat') renderCadList();
            if(['all', 'favs'].includes(activeTab)) renderFoodGrid();
        }

        function renderCadList() {
            const grid = document.getElementById('cad-list-grid');
            if(!grid) return;
            grid.innerHTML = "";
            Object.keys(allCaducitats).forEach(id => {
                const c = allCaducitats[id];
                if(!c) return;
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center";
                div.innerHTML = `
                    <div class="flex-1 pr-4">
                        <div class="font-black text-sm recipe-card-text">${c.nom || 'Sense nom'}</div>
                        <div class="text-[10px] font-bold text-red-500 uppercase">${c.caducitat || '-'}</div>
                    </div>
                    <button onclick="deleteCaducitat('${id}')" class="text-red-400 font-black text-xs px-3">ESBORRAR</button>
                `;
                grid.appendChild(div);
            });
        }

        function renderFoodGrid() {
            const grid = document.getElementById('main-grid');
            const searchInput = document.getElementById('search-input');
            if(!grid || !searchInput) return;
            const search = searchInput.value.toLowerCase();
            grid.innerHTML = "";
            let filtered = allAliments.filter(a => (a && a.nom ? a.nom.toLowerCase() : "").includes(search));
            if(activeTab === 'favs') filtered = filtered.filter(a => a && a.fav);
            filtered.forEach(a => {
                if(!a) return;
                const div = document.createElement('div');
                div.className = "food-card cursor-pointer";
                div.onclick = () => openEdit(a);
                
                const hasLink = a.link && a.link.trim().length > 0;
                const isFav = !!a.fav;
                const isProvar = !!a.provar;
                
                div.innerHTML = `
                    <div class="flex items-center justify-between gap-4">
                        <!-- Esquerra: M'agrada -->
                        <div class="action-btn-circle ${isFav ? 'active-heart' : ''}" onclick="toggleFav('${a.id}', ${!isFav}, event)">
                            ${isFav ? '❤️' : '🤍'}
                        </div>
                        
                        <!-- Centre: Nom -->
                        <div class="text-center flex-1">
                            <div class="text-sm font-black leading-tight recipe-card-text">${a.nom || 'Sense nom'}</div>
                        </div>

                        <!-- Dreta: Provar -->
                        <div class="action-btn-circle ${isProvar ? 'active-eyes' : ''}" onclick="toggleProvar('${a.id}', ${!isProvar}, event)">
                            ${isProvar ? '👀' : '👁️'}
                        </div>
                    </div>

                    <!-- Abaix: Link -->
                    <div class="link-footer-btn" onclick="handleActionClick(event, '${hasLink ? a.link : ''}', '${(a.nom || '').replace(/'/g, "\\'")}')">
                        <span>${hasLink ? '🔗 VEURE RECEPTA' : '🔍 BUSCAR A GOOGLE'}</span>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        window.openEdit = (a) => {
            showModal(`
                <div class="p-8 space-y-6">
                    <div class="flex justify-between items-start gap-4">
                        <h2 class="text-xl font-black recipe-card-text">${a.nom || 'Sense nom'}</h2>
                        <div class="flex gap-2">
                             <button onclick="toggleProvar('${a.id}', ${!a.provar})" class="text-2xl">${a.provar ? '👀' : '👁️'}</button>
                             <button onclick="toggleFav('${a.id}', ${!a.fav})" class="text-2xl">${a.fav ? '❤️' : '🤍'}</button>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Ingredients</label>
                        <textarea id="edit-ing" placeholder="Ingredients..." class="w-full p-4 bg-slate-50 border rounded-2xl h-24 font-bold text-sm outline-none focus:ring-2 focus:ring-orange-500">${a.ingredients || ''}</textarea>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Com es prepara?</label>
                        <textarea id="edit-met" placeholder="Pas a pas..." class="w-full p-4 bg-slate-50 border rounded-2xl h-32 font-bold text-sm outline-none focus:ring-2 focus:ring-orange-500">${a.metode || ''}</textarea>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Link</label>
                        <input id="edit-link" type="url" value="${a.link || ''}" placeholder="https://..." class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                    <div class="flex gap-2 pt-4">
                        <button onclick="updateRecepta('${a.id}')" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black">DESAR CANVIS</button>
                        <button onclick="deleteRecepta('${a.id}')" class="px-6 bg-red-100 text-red-500 rounded-2xl font-black">🗑️</button>
                    </div>
                    <button onclick="closeModal()" class="w-full py-2 text-slate-400 font-bold">Tancar</button>
                </div>
            `);
        };

        window.openCreateAliment = () => {
            showModal(`
                <div class="p-8 space-y-6">
                    <h2 class="text-xl font-black">Nova Recepta</h2>
                    <div class="space-y-4">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Nom de la recepta</label>
                        <input id="new-nom" placeholder="Nom del plat..." class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:ring-2 focus:ring-orange-500">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Ingredients</label>
                        <textarea id="new-ing" placeholder="Llista d'ingredients..." class="w-full p-4 bg-slate-50 border rounded-2xl h-24 font-bold text-sm outline-none focus:ring-2 focus:ring-orange-500"></textarea>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Com es prepara?</label>
                        <textarea id="new-met" placeholder="Instruccions pas a pas..." class="w-full p-4 bg-slate-50 border rounded-2xl h-24 font-bold text-sm outline-none focus:ring-2 focus:ring-orange-500"></textarea>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Link</label>
                        <input id="new-link" type="url" placeholder="Link (opcional)" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                    <button onclick="saveNew()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black shadow-lg shadow-orange-200">CREAR RECEPTA</button>
                    <button onclick="closeModal()" class="w-full py-2 text-slate-400 font-bold">Tancar</button>
                </div>
            `);
        };

        window.openSelector = (f, t) => {
            showModal(`
                <div class="p-8 space-y-6">
                    <h2 class="text-xl font-black uppercase">Afegir al menú</h2>
                    <div class="space-y-2 max-h-80 overflow-y-auto pr-2">
                        ${allAliments.map(a => `
                            <div onclick="addPlat('${f}','${t}','${(a.nom || 'Sense nom').replace(/'/g,"\\'")}')" class="p-4 bg-slate-50 rounded-2xl font-bold cursor-pointer hover:bg-orange-50 border border-transparent hover:border-orange-200 transition-all leading-tight recipe-card-text">${a.nom || 'Sense nom'}</div>
                        `).join('')}
                    </div>
                    <button onclick="closeModal()" class="w-full py-2 text-slate-400 font-bold">Tancar</button>
                </div>
            `);
        };

        window.exportReceptesCSV = () => {
            let csv = "Nom,Ingredients,Metode,Link\n";
            allAliments.forEach(a => { csv += `"${(a.nom || '').replace(/"/g, '""')}","${(a.ingredients || '').replace(/\n/g, ' ').replace(/"/g, '""')}","${(a.metode || '').replace(/\n/g, ' ').replace(/"/g, '""')}","${(a.link || '').replace(/"/g, '""')}"\n`; });
            downloadCSV(csv, 'totes_les_receptes.csv');
        };

        window.exportMenuCSV = () => {
            const start = document.getElementById('export-start').value;
            const end = document.getElementById('export-end').value;
            if(!start || !end) { window.showToast("Selecciona les dates"); return; }
            let csv = "Data,Tipus,Plats\n";
            const s = new Date(start); const e = new Date(end);
            for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
                const iso = d.toISOString().split('T')[0];
                const sel = allSelections[iso] || {};
                const dinars = (sel.comida || []).join(' | ');
                const sopars = (sel.cena || []).join(' | ');
                if(dinars) csv += `${iso},DINAR,"${dinars.replace(/"/g, '""')}"\n`;
                if(sopars) csv += `${iso},SOPAR,"${sopars.replace(/"/g, '""')}"\n`;
            }
            downloadCSV(csv, `menu_${start}_a_${end}.csv`);
        };

        function downloadCSV(content, filename) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', ''); a.setAttribute('href', url); a.setAttribute('download', filename);
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            window.showToast("CSV generat correctament");
        }

        window.setTab = (t) => { activeTab = activeTab === t ? 'none' : t; render(); };
        window.changeWeek = (n) => { offset += n; render(); };

        function updateUI() {
            ['all', 'favs', 'caducitat', 'export'].forEach(t => {
                const b = document.getElementById('btn-'+t);
                if(b) b.classList.toggle('active-tab', activeTab === t);
            });
        }

        function showModal(h) {
            const m = document.getElementById('modal-content');
            const c = document.getElementById('modal-container');
            if(m && c) { m.innerHTML = h; c.classList.remove('hidden'); }
        }

        document.addEventListener('input', (e) => { if(e.target.id === 'search-input') render(); });
        document.getElementById('modal-container').onclick = (e) => e.target.id === 'modal-container' && closeModal();

        initFirebase();
    </script>
</body>
</html>
