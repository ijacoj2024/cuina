<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Cuina Intel·ligent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9; 
            min-height: 100vh;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .day-card { 
            min-height: 380px; 
            display: flex; 
            flex-direction: column; 
            background-color: #1e293b; 
            border: 1px solid #334155;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .day-card.today {
            background-color: #0f172a;
            border: 3px solid #f59e0b;
            transform: scale(1.02);
            z-index: 10;
        }

        .recipe-chip {
            background: rgba(51, 65, 85, 0.5);
            border-left: 3px solid #f59e0b;
        }

        .tab-active {
            border-bottom: 3px solid #f59e0b;
            color: #f59e0b;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app-root" class="max-w-7xl mx-auto relative">
        <!-- Capçalera -->
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tight flex items-center gap-3">
                    Cuina de Casa <span class="text-orange-500">🥘</span>
                </h1>
                <div class="flex items-center gap-2 mt-2">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-orange-500 animate-pulse"></div>
                    <p id="status-text" class="text-slate-500 text-xs font-bold uppercase tracking-wider">Connectant amb Firebase...</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 bg-white p-2.5 rounded-[2rem] shadow-md border border-slate-200">
                <button id="btn-prev" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-slate-100 transition-all text-slate-600 text-xl font-bold border border-slate-100">〈</button>
                <span id="rango-fechas" class="px-6 font-black text-slate-800 text-lg min-w-[160px] text-center tracking-tight">Carregant...</span>
                <button id="btn-next" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-slate-100 transition-all text-slate-600 text-xl font-bold border border-slate-100">〉</button>
            </div>
        </header>

        <!-- Calendari de 7 dies -->
        <div id="calendar-grid" class="grid grid-cols-1 md:grid-cols-7 gap-5 mb-12">
            <!-- Es genera per JS -->
        </div>

        <!-- Secció de Receptes / Aliments -->
        <div class="bg-white rounded-[3rem] p-8 shadow-xl border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-100 pb-4">
                <div class="flex gap-8">
                    <button id="tab-favs" onclick="window.setTab('favs')" class="text-xl font-black transition-all tab-active pb-2">⭐ Preferits</button>
                    <button id="tab-all" onclick="window.setTab('all')" class="text-xl font-black text-slate-400 transition-all pb-2">📂 Tots els Aliments</button>
                </div>
                <div class="relative w-full md:w-64">
                    <input type="text" id="search-main" placeholder="Cerca al receptari..." class="w-full pl-10 pr-4 py-3 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none text-sm font-bold text-slate-700">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                </div>
            </div>
            
            <div id="grid-aliments" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 max-h-[600px] overflow-y-auto custom-scroll pr-4">
                <!-- Es genera per JS -->
            </div>
        </div>
    </div>

    <!-- Modal d'Afegir Plat al Calendari -->
    <div id="modal-receptes" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[3rem] shadow-2xl overflow-hidden">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <div>
                    <h3 class="font-black text-slate-800 text-2xl">Afegir <span id="modal-dia-label" class="text-orange-500">...</span></h3>
                    <p class="text-slate-400 text-sm font-medium mt-1">Busca i selecciona un plat</p>
                </div>
                <button onclick="window.closeModals()" class="bg-slate-200 hover:bg-slate-300 w-12 h-12 rounded-full flex items-center justify-center text-slate-600 text-2xl">×</button>
            </div>
            <div class="p-6">
                <input type="text" id="modal-search-input" onkeyup="window.renderModalList()" placeholder="Escriu el nom del plat..." class="w-full px-6 py-4 bg-slate-100 border-2 border-slate-100 rounded-2xl focus:border-orange-500 focus:ring-0 outline-none font-bold text-slate-700 mb-4">
                <div id="llista-modal" class="max-h-[400px] overflow-y-auto custom-scroll space-y-2 pr-2">
                    <!-- JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal d'Edició d'Aliment -->
    <div id="modal-edit-aliment" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[3rem] shadow-2xl overflow-hidden">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-orange-50">
                <h3 class="font-black text-slate-800 text-2xl">Editar Aliment</h3>
                <button onclick="window.closeModals()" class="text-slate-400 hover:text-slate-600 text-3xl">×</button>
            </div>
            <div class="p-8 space-y-6">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Nom de l'Aliment</label>
                    <input type="text" id="edit-nom" class="w-full px-6 py-4 bg-slate-100 rounded-2xl font-bold text-slate-800 border-none outline-none focus:ring-2 focus:ring-orange-500">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Ingredients / Notes</label>
                    <textarea id="edit-ingredients" rows="3" class="w-full px-6 py-4 bg-slate-100 rounded-2xl font-medium text-slate-600 border-none outline-none focus:ring-2 focus:ring-orange-500" placeholder="Llista d'ingredients..."></textarea>
                </div>
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                    <span class="font-bold text-slate-700">Afegir a Preferits ⭐</span>
                    <input type="checkbox" id="edit-fav" class="w-6 h-6 accent-orange-500">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="window.saveAliment()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black hover:bg-orange-500 transition-colors">GUARDAR CANVIS</button>
                    <button onclick="window.deleteAlimentPermanently()" class="px-6 bg-red-100 text-red-600 rounded-2xl hover:bg-red-200 transition-colors">🗑️</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        (function() {
            let db;
            let offset = 0, selFecha = "", selTipo = "", activeTab = 'favs';
            let allAlimentsRaw = {}, allAliments = [], allSelections = {}, allCaducitats = {};

            const toISO = (d) => {
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, "0");
                const day = String(d.getDate()).padStart(2, "0");
                return `${year}-${month}-${day}`;
            };
            const toDM = (d) => d.getDate() + "/" + (d.getMonth()+1);

            function initFirebase() {
                if (typeof firebase === 'undefined') return;
                try {
                    const config = { databaseURL: "https://calendari-menjars-default-rtdb.europe-west1.firebasedatabase.app" };
                    if (!firebase.apps.length) firebase.initializeApp(config);
                    db = firebase.database();
                    setupListeners();
                } catch (e) {
                    console.error("Error Firebase:", e);
                }
            }

            function setupListeners() {
                if (!db) return;
                db.ref('aliments').on('value', s => {
                    allAlimentsRaw = s.val() || {};
                    allAliments = [];
                    Object.keys(allAlimentsRaw).forEach(key => {
                        let item = allAlimentsRaw[key];
                        if (typeof item === 'string') item = { nom: item };
                        allAliments.push({ ...item, id: key });
                    });
                    allAliments.sort((a,b) => (a.nom || "").localeCompare(b.nom || ""));
                    render();
                }, err => console.error("Error llegint aliments:", err));

                db.ref('seleccions').on('value', s => { 
                    allSelections = s.val() || {}; 
                    render(); 
                }, err => console.error("Error llegint seleccions:", err));

                db.ref('aliments_caducitat').on('value', s => { 
                    allCaducitats = s.val() || {}; 
                    const dot = document.getElementById('status-dot');
                    if (dot) dot.classList.replace('bg-orange-500', 'bg-emerald-500');
                    const txt = document.getElementById('status-text');
                    if (txt) txt.innerText = "Sincronitzat";
                    render(); 
                }, err => console.error("Error llegint caducitats:", err));
            }

            window.setTab = (t) => {
                activeTab = t;
                const tabFavs = document.getElementById('tab-favs');
                const tabAll = document.getElementById('tab-all');
                if (tabFavs) tabFavs.className = t === 'favs' ? 'text-xl font-black transition-all tab-active pb-2' : 'text-xl font-black text-slate-400 transition-all pb-2';
                if (tabAll) tabAll.className = t === 'all' ? 'text-xl font-black transition-all tab-active pb-2' : 'text-xl font-black text-slate-400 transition-all pb-2';
                renderAliments();
            };

            window.openWpModal = (f, t) => {
                selFecha = f; selTipo = t;
                const label = document.getElementById('modal-dia-label');
                if (label) label.innerText = t === 'comida' ? 'Dinar' : 'Sopar';
                const modal = document.getElementById('modal-receptes');
                if (modal) modal.classList.remove('hidden');
                const searchInput = document.getElementById('modal-search-input');
                if (searchInput) {
                    searchInput.value = "";
                    setTimeout(() => searchInput.focus(), 100);
                }
                window.renderModalList();
            };

            window.renderModalList = () => {
                const searchInput = document.getElementById('modal-search-input');
                const query = searchInput ? searchInput.value.toLowerCase() : "";
                const box = document.getElementById('llista-modal');
                if (!box) return;
                box.innerHTML = "";
                
                const filtered = allAliments.filter(a => (a.nom || "").toLowerCase().includes(query));
                
                filtered.forEach(a => {
                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center p-4 bg-slate-50 hover:bg-orange-50 rounded-2xl cursor-pointer transition-all border border-slate-100 group";
                    item.onclick = () => window.addPlat(a.nom);
                    item.innerHTML = `<div><span class="text-slate-800 font-bold">${a.nom}</span> ${a.fav ? '⭐' : ''}</div><span class="text-orange-500 font-black text-xl group-hover:translate-x-1 transition-transform">＋</span>`;
                    box.appendChild(item);
                });
            };

            window.addPlat = (nom) => {
                if (!db) return;
                let current = allSelections[selFecha]?.[selTipo];
                let plats = Array.isArray(current) ? [...current] : [];
                plats.push(nom);
                db.ref('seleccions/' + selFecha + '/' + selTipo).set(plats).then(() => window.closeModals());
            };

            window.delPlat = (f, t, i) => {
                if (!db || !allSelections[f] || !allSelections[f][t]) return;
                let plats = [...(allSelections[f][t] || [])];
                plats.splice(i, 1);
                db.ref('seleccions/' + f + '/' + t).set(plats);
            };

            window.openEditAliment = (id) => {
                const a = allAliments.find(x => x.id === id);
                if (!a) return;
                const modal = document.getElementById('modal-edit-aliment');
                if (!modal) return;

                document.getElementById('edit-id').value = id;
                document.getElementById('edit-nom').value = a.nom || "";
                document.getElementById('edit-ingredients').value = a.ingredients || "";
                document.getElementById('edit-fav').checked = !!a.fav;
                modal.classList.remove('hidden');
            };

            window.saveAliment = () => {
                if (!db) return;
                const id = document.getElementById('edit-id').value;
                const update = {
                    nom: document.getElementById('edit-nom').value,
                    ingredients: document.getElementById('edit-ingredients').value,
                    fav: document.getElementById('edit-fav').checked
                };
                db.ref('aliments/' + id).update(update).then(() => window.closeModals());
            };

            window.deleteAlimentPermanently = () => {
                if (!db) return;
                const id = document.getElementById('edit-id').value;
                if(confirm("Segur que vols esborrar aquest aliment per sempre de la llista?")) {
                    db.ref('aliments/' + id).remove().then(() => window.closeModals());
                }
            };

            window.closeModals = () => {
                const m1 = document.getElementById('modal-receptes');
                const m2 = document.getElementById('modal-edit-aliment');
                if (m1) m1.classList.add('hidden');
                if (m2) m2.classList.add('hidden');
            };

            function render() {
                const calendarGrid = document.getElementById('calendar-grid');
                if (!calendarGrid) return;

                const hoy = new Date(); hoy.setHours(0,0,0,0);
                const d = new Date();
                const day = d.getDay(), diff = d.getDate() - (day == 0 ? 6 : day - 1);
                const lunes = new Date(d.setDate(diff + (offset * 7))); lunes.setHours(0,0,0,0);
                const dom = new Date(lunes); dom.setDate(lunes.getDate() + 6);
                
                const rangeLabel = document.getElementById('rango-fechas');
                if (rangeLabel) rangeLabel.innerText = toDM(lunes) + " - " + toDM(dom);
                
                const diesNames = ["Dilluns", "Dimarts", "Dimecres", "Dijous", "Divendres", "Dissabte", "Diumenge"];
                calendarGrid.innerHTML = "";

                for (let i = 0; i < 7; i++) {
                    const curr = new Date(lunes); curr.setDate(lunes.getDate() + i);
                    const iso = toISO(curr);
                    const esHoy = curr.toDateString() === hoy.toDateString();

                    let cadHtml = "";
                    Object.keys(allCaducitats).forEach(key => {
                        if (allCaducitats[key].caducitat === iso) {
                            cadHtml += `<div class="mt-2 p-2 bg-red-500 text-white rounded-xl text-[10px] font-black shadow-sm">⚠️ ${allCaducitats[key].nom}</div>`;
                        }
                    });

                    const card = document.createElement('div');
                    card.className = `day-card p-5 rounded-[2rem] ${esHoy ? 'today' : ''}`;
                    
                    let inner = `<div class="text-center mb-6">
                        <p class="text-[10px] font-black uppercase ${esHoy ? 'text-orange-400' : 'text-slate-500'}">${diesNames[i]}</p>
                        <p class="text-4xl font-black text-white">${curr.getDate()}</p>
                        ${cadHtml}
                    </div>`;

                    ["comida", "cena"].forEach(t => {
                        const icon = t === 'comida' ? '☀️' : '🌙';
                        const plats = (allSelections[iso] && allSelections[iso][t]) ? allSelections[iso][t] : [];
                        let pList = Array.isArray(plats) ? plats.map((n, idx) => `
                            <div class="recipe-chip flex justify-between items-center p-2 rounded-xl mb-1 text-[11px] text-slate-100">
                                <span class="truncate">${n}</span>
                                <button onclick="window.delPlat('${iso}','${t}',${idx})" class="text-slate-400 hover:text-white px-1">×</button>
                            </div>
                        `).join('') : '';

                        inner += `<div class="mb-4">
                            <p class="text-[9px] font-black text-slate-500 tracking-widest mb-2">${icon} ${t.toUpperCase()}</p>
                            ${pList}
                            <button onclick="window.openWpModal('${iso}','${t}')" class="w-full py-2 text-[10px] font-black text-slate-500 border border-dashed border-slate-700 rounded-xl hover:bg-slate-800 mt-2">＋ AFegir</button>
                        </div>`;
                    });

                    card.innerHTML = inner;
                    calendarGrid.appendChild(card);
                }
                renderAliments();
            }

            function renderAliments() {
                const box = document.getElementById('grid-aliments');
                if (!box) return;
                const searchMain = document.getElementById('search-main');
                const filter = searchMain ? searchMain.value.toLowerCase() : "";
                box.innerHTML = "";
                
                let filtered = allAliments.filter(a => (a.nom || "").toLowerCase().includes(filter));
                if (activeTab === 'favs') filtered = filtered.filter(a => a.fav);

                filtered.forEach(a => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-50 p-4 rounded-3xl border-2 border-slate-100 flex flex-col items-center text-center gap-2 hover:border-orange-300 hover:bg-white transition-all cursor-pointer relative group";
                    card.onclick = () => window.openEditAliment(a.id);
                    card.innerHTML = `
                        <div class="w-12 h-12 rounded-xl bg-white text-orange-500 flex items-center justify-center font-black text-xl shadow-sm border border-slate-100">${(a.nom || "?").charAt(0).toUpperCase()}</div>
                        <span class="text-xs font-black text-slate-800 leading-tight">${a.nom}</span>
                        ${a.fav ? '<span class="absolute top-2 right-2 text-xs">⭐</span>' : ''}
                        <div class="absolute inset-0 bg-slate-900/10 opacity-0 group-hover:opacity-100 transition-opacity rounded-3xl flex items-center justify-center">
                            <span class="bg-white px-3 py-1 rounded-full text-[10px] font-black text-slate-800 shadow-sm">EDITAR</span>
                        </div>
                    `;
                    box.appendChild(card);
                });
            }

            // Inicialització segura
            const interval = setInterval(() => {
                if (typeof firebase !== 'undefined') {
                    clearInterval(interval);
                    initFirebase();
                }
            }, 100);

            window.onload = () => {
                const bp = document.getElementById('btn-prev');
                const bn = document.getElementById('btn-next');
                const sm = document.getElementById('search-main');
                if (bp) bp.onclick = () => { offset--; render(); };
                if (bn) bn.onclick = () => { offset++; render(); };
                if (sm) sm.onkeyup = renderAliments;
            };
        })();
    </script>
</body>
</html>
